# GoReleaser configuration for hostveil
# See https://goreleaser.com for details
#
# Produces tar.gz archives matching the Makefile `dist` target format:
#   hostveil-v{Version}-{Os}-{Arch}.tar.gz + .sha256 checksum files
# Uploads everything to GitHub Releases automatically.

version: 2
project_name: hostveil

before:
  hooks:
    - go mod tidy

builds:
  - id: hostveil
    main: ./cmd/hostveil/
    binary: hostveil
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: tar-gz
    name_template: >-
      {{ .ProjectName }}-v{{ .Version }}-{{ .Os }}-{{ .Arch }}
    format: tar.gz
    files:
      - none*
    # Archive contains only the single binary, no extra files.

checksum:
  name_template: "{{ .ProjectName }}-v{{ .Version }}-checksums.txt"
  algorithm: sha256

release:
  github:
    owner: seolcu
    name: hostveil
  name_template: "v{{.Version}}"
  header: |
    ## hostveil v{{.Version}}

    Linux self-hosting security dashboard.

    ### Installation

    ```sh
    curl -fsSL https://raw.githubusercontent.com/seolcu/hostveil/main/scripts/install.sh | bash
    ```

    Or download the archive for your platform and verify:

    ```sh
    curl -fsSLO https://github.com/seolcu/hostveil/releases/download/v{{.Version}}/hostveil-v{{.Version}}-linux-amd64.tar.gz
    curl -fsSLO https://github.com/seolcu/hostveil/releases/download/v{{.Version}}/hostveil-v{{.Version}}-checksums.txt
    sha256sum -c hostveil-v{{.Version}}-checksums.txt --ignore-missing
    tar xzf hostveil-v{{.Version}}-linux-amd64.tar.gz
    sudo install hostveil /usr/local/bin/
    ```
