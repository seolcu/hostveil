version: 2
project_name: hostveil

before:
  hooks:
    - go mod tidy

builds:
  - id: hostveil
    main: ./cmd/hostveil/
    binary: hostveil
    ldflags:
      - -s -w
      - -X main.version=v{{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: tar-gz
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}
    formats: ["tar.gz"]

checksum:
  name_template: "{{ .ProjectName }}-checksums.txt"
  algorithm: sha256

# One SBOM per archive, so anyone auditing a hostveil binary can see the
# dependency set it was built from without trusting a build log.
sboms:
  - id: archive-sbom
    artifacts: archive

# release-please owns the changelog. It derives one from conventional-commit
# history, writes it to CHANGELOG.md and into the release body, and does so
# before goreleaser ever runs. A second git-log-derived changelog here would
# be a competing source of truth for the same text.
changelog:
  disable: true

release:
  github:
    owner: seolcu
    name: hostveil
  name_template: "v{{.Version}}"
  # The release already exists by the time this runs: release-please creates
  # it, and the tag with it, when the release pull request merges. Under
  # keep-existing goreleaser finds that release and only uploads archives,
  # checksums, and SBOMs to it, leaving the body alone. Any other mode would
  # splice goreleaser's own notes over release-please's. This is goreleaser's
  # default, said out loud because the whole arrangement depends on it.
  mode: keep-existing
