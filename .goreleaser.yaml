version: 2
project_name: hostveil

before:
  hooks:
    - go mod tidy

builds:
  - id: hostveil
    main: ./cmd/hostveil/
    binary: hostveil
    ldflags:
      - -s -w
      - -X main.version=v{{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: tar-gz
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}
    formats: ["tar.gz"]

checksum:
  name_template: "{{ .ProjectName }}-checksums.txt"
  algorithm: sha256

# One SBOM per archive, so anyone auditing a hostveil binary can see the
# dependency set it was built from without trusting a build log.
sboms:
  - id: archive-sbom
    artifacts: archive

# The changelog is written by hand into CHANGELOG.md and the release body
# before this runs, derived from conventional-commit history (see AGENTS.md).
# A second git-log-derived changelog here would be a competing source of truth
# for the same text, and goreleaser's would land in a release body that
# already has one.
changelog:
  disable: true

release:
  github:
    owner: seolcu
    name: hostveil
  name_template: "v{{.Version}}"
  # The release already exists by the time this runs: a maintainer creates it,
  # and the tag with it, which is what starts the release workflow. Under
  # keep-existing goreleaser finds that release and only uploads archives,
  # checksums, and SBOMs to it, leaving the body alone. Any other mode would
  # splice goreleaser's own notes over the hand-written release notes. This is
  # goreleaser's default, said out loud because the whole arrangement depends
  # on it.
  mode: keep-existing
