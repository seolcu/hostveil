version: 2
project_name: hostveil

before:
  hooks:
    - go mod tidy

builds:
  - id: hostveil
    main: ./cmd/hostveil/
    binary: hostveil
    ldflags:
      - -s -w
      - -X github.com/seolcu/hostveil/internal/tui.Version=v{{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: tar-gz
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}
    formats: ["tar.gz"]

checksum:
  name_template: "{{ .ProjectName }}-checksums.txt"
  algorithm: sha256

release:
  github:
    owner: seolcu
    name: hostveil
  name_template: "v{{.Version}}"
  header: |
    ## hostveil v{{.Version}}

    Finds the security mistakes on your self-hosted Linux server, explains them in plain language, and fixes them safely.

    ### Installation

    ```sh
    curl -fsSL https://raw.githubusercontent.com/seolcu/hostveil/main/scripts/install.sh | bash
    ```
