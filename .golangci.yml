run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - gofmt
    - goimports
    - ineffassign
    - unused
    - errcheck

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/seolcu/hostveil
  lll:
    line-length: 100
    tab-width: 4

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, lll]
