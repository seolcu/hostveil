services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: hostveil-lab-vaultwarden
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
      - "0.0.0.0:3012:3012"
    environment:
      SIGNUPS_ALLOWED: "true"
      ADMIN_TOKEN: lab-admin-token
      DOMAIN: http://vaultwarden.local
    volumes:
      - vaultwarden-data:/data
      - /etc/shadow:/host/shadow:ro
    networks:
      - lab-net

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: hostveil-lab-jellyfin
    restart: unless-stopped
    user: root
    ports:
      - "0.0.0.0:8096:8096"
      - "0.0.0.0:7359:7359/udp"
    environment:
      JELLYFIN_PublishedServerUrl: http://media.lab.local:8096
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ./docker/lab/media:/media
    networks:
      - lab-net

  gitea:
    image: gitea/gitea:latest
    container_name: hostveil-lab-gitea
    restart: unless-stopped
    privileged: true
    ports:
      - "0.0.0.0:3000:3000"
      - "0.0.0.0:2222:22"
    environment:
      USER_UID: "0"
      USER_GID: "0"
      GITEA__server__ROOT_URL: http://git.lab.local:3000/
    volumes:
      - gitea-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lab-net

  nextcloud:
    image: nextcloud:latest
    container_name: hostveil-lab-nextcloud
    restart: unless-stopped
    ports:
      - "0.0.0.0:8082:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud
    volumes:
      - nextcloud-data:/var/www/html
    networks:
      - lab-net

  nextcloud-db:
    image: postgres:latest
    container_name: hostveil-lab-nextcloud-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud
    volumes:
      - nextcloud-db:/var/lib/postgresql/data
    networks:
      - lab-net

  exposed-nginx:
    image: nginx:stable
    container_name: hostveil-lab-exposed-nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:8083:80"
    volumes:
      - /etc/shadow:/mnt/shadow:ro
    user: 1000:1000
    networks:
      - lab-net

volumes:
  vaultwarden-data:
  jellyfin-config:
  jellyfin-cache:
  gitea-data:
  nextcloud-data:
  nextcloud-db:

networks:
  lab-net:
    name: hostveil-lab
    driver: bridge
