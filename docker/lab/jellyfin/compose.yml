services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: hostveil-lab-jellyfin
    restart: unless-stopped
    user: root
    environment:
      JELLYFIN_PublishedServerUrl: http://media.lab.local:8096
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ../../media:/media
    networks:
      - lab-net

volumes:
  jellyfin-config:
  jellyfin-cache:

networks:
  lab-net:
    name: hostveil-lab
    external: true
