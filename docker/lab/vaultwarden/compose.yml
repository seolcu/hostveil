services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: hostveil-lab-vaultwarden
    restart: unless-stopped
    environment:
      SIGNUPS_ALLOWED: "true"
      ADMIN_TOKEN: lab-admin-token
      DOMAIN: http://vaultwarden.local
    volumes:
      - vaultwarden-data:/data
      - /etc/shadow:/host/shadow:ro
    networks:
      - lab-net

volumes:
  vaultwarden-data:

networks:
  lab-net:
    name: hostveil-lab
    external: true
