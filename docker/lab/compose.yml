services:
  lab:
    build:
      context: ../..
      dockerfile: docker/lab/Dockerfile
    volumes:
      - ../..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock:ro
    privileged: true
    init: true
    stdin_open: true
    tty: true
    networks:
      - lab-net

networks:
  lab-net:
    name: hostveil-lab
    driver: bridge
