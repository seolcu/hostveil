# Orchestration: start the vulnerable test host
# Usage: ./run.sh up | down | hostveil [...] | sh
name: hostveil-test

services:
  test-host:
    build:
      context: .
      dockerfile: Dockerfile
    image: hostveil-test-host:latest
    container_name: hostveil-test
    privileged: true
    hostname: test-selfhost
    ports:
      - "8787:8787"
    volumes:
      - ..:/hostveil
    environment:
      - HOSTVEIL_TEST=1
