# Over-privileged compose project — covers ds001, ds003, ds004, ds005
services:
  app:
    image: alpine:3.21
    command: ["sleep", "infinity"]
    pid: "host"
    ipc: "host"
    privileged: true
    cap_add:
      - SYS_ADMIN
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    tmpfs: /tmp:noexec
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - app-data:/data:ro

volumes:
  app-data:
