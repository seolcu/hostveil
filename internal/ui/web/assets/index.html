<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hostveil</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- Generated from internal/ui/theme: the palettes, then the layout that
       draws from them. theme.js is blocking and in <head> on purpose — it
       restores the saved theme before the first paint, and the page's CSP
       (default-src 'self') rules out doing that inline. -->
  <link rel="stylesheet" href="/themes.css">
  <link rel="stylesheet" href="/app.css">
  <script src="/theme.js"></script>
</head>
<body>
  <div class="statusbar">
    <div class="brand"><b>hostveil</b></div>
    <div class="gauge" id="gauge"></div>
    <div class="actions">
      <select id="theme" aria-label="Color theme"></select>
      <button id="history">History</button>
      <button id="rescan">Rescan</button>
      <button id="fixall" class="primary">Fix all safe</button>
    </div>
  </div>

  <div class="axes" id="axes"></div>
  <div class="delta" id="delta" hidden></div>
  <div class="domains" id="domains" hidden></div>
  <div class="status" id="status" hidden></div>

  <main>
    <section class="findings">
      <div class="pane-head" id="findings-title">Findings</div>
      <div class="filterbar" id="filterbar"></div>
      <div class="batchbar" id="batchbar" hidden></div>
      <ul id="findings"></ul>
    </section>
    <section class="detail" id="detail">
      <p class="empty">Reading the scan…</p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
