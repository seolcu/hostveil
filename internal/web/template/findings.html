{{define "findings.html"}}
<div style="margin-bottom:16px">
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <select class="filter" hx-get="/findings" hx-target="#content" name="severity">
      <option value="">All Severities</option>
      <option value="critical">Critical</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <select class="filter" hx-get="/findings" hx-target="#content" name="source">
      <option value="">All Sources</option>
      <option value="native_compose">Compose</option>
      <option value="trivy">Trivy</option>
      <option value="dockle">Dockle</option>
    </select>
    <input class="filter" type="search" placeholder="Search..." name="search" hx-get="/findings" hx-trigger="keyup changed delay:300ms" hx-target="#content" style="flex:1;min-width:160px">
  </div>
</div>

<div style="font-size:12px;color:var(--muted);margin-bottom:8px">{{len .Result.Findings}} findings</div>

<table style="width:100%;border-collapse:separate;border-spacing:0;font-size:13px">
  <tr>
    <th style="text-align:left;padding:10px 12px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--surface)">Severity</th>
    <th style="text-align:left;padding:10px 12px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--surface)">Title</th>
    <th style="text-align:left;padding:10px 12px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--surface)">Axis</th>
    <th style="text-align:left;padding:10px 12px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--surface)">Service</th>
  </tr>
  {{range .Result.Findings}}
  <tr style="cursor:pointer;transition:0.15s" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background='transparent'">
    <td style="padding:10px 12px;border-bottom:1px solid var(--border)">
      <span class="badge" style="background:{{if eq .Severity.String "critical"}}rgba(247,118,142,0.15);color:var(--critical){{else if eq .Severity.String "high"}}rgba(255,158,100,0.15);color:var(--high){{else if eq .Severity.String "medium"}}rgba(224,175,104,0.15);color:var(--medium){{else}}rgba(158,206,106,0.15);color:var(--low){{end}}">{{.Severity.String}}</span>
    </td>
    <td style="padding:10px 12px;border-bottom:1px solid var(--border);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{.Title}}</td>
    <td style="padding:10px 12px;border-bottom:1px solid var(--border);color:var(--muted);font-size:12px">{{.Axis.Label}}</td>
    <td style="padding:10px 12px;border-bottom:1px solid var(--border);color:var(--muted);font-size:12px">{{.Service}}</td>
  </tr>
  {{end}}
</table>
{{end}}
