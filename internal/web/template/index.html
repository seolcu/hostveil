<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostveil</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
:root {
  --bg: #0f0f14; --surface: #16161e; --card: #1a1b26; --hover: #24283b;
  --border: #2f3348; --text: #a9b1d6; --muted: #565f89; --bright: #c0caf5;
  --accent: #7aa2f7; --critical: #f7768e; --high: #ff9e64;
  --medium: #e0af68; --low: #9ece6a; --success: #73daca;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6;
}
.app { display: flex; height: 100vh; }
.sidebar {
  width: 220px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar h2 { padding: 16px 20px; font-size: 16px; color: var(--bright); border-bottom: 1px solid var(--border); }
.nav { list-style: none; padding: 12px; flex: 1; }
.nav a {
  display: block; padding: 10px 14px; border-radius: 6px; color: var(--muted);
  text-decoration: none; transition: 0.15s; margin-bottom: 2px; font-weight: 500;
}
.nav a:hover { background: var(--hover); color: var(--text); }
.nav a.active { background: rgba(122,162,247,0.1); color: var(--accent); }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.header {
  height: 56px; border-bottom: 1px solid var(--border); display: flex;
  align-items: center; justify-content: space-between; padding: 0 24px;
  background: var(--surface);
}
.header h1 { font-size: 16px; font-weight: 600; color: var(--bright); }
.content { flex: 1; overflow-y: auto; padding: 24px; }
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; margin-bottom: 16px;
}
.card-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
.filter {
  background: var(--hover); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; font-size: 13px; outline: none;
}
.filter:focus { border-color: var(--accent); }
.htmx-indicator { display: none; }
.htmx-request .htmx-indicator { display: inline; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <h2>Hostveil</h2>
    <ul class="nav">
      <li><a href="/overview" hx-get="/overview" hx-target="#content" class="active">Dashboard</a></li>
      <li><a href="/findings" hx-get="/findings" hx-target="#content">Findings</a></li>
      <li><a href="/history" hx-get="/history" hx-target="#content">History</a></li>
      <li><a href="/settings" hx-get="/settings" hx-target="#content">Settings</a></li>
    </ul>
  </div>
  <div class="main">
    <header class="header">
      <h1>Dashboard</h1>
      <span style="color:var(--muted);font-size:12px">Hostveil v1.0.0</span>
    </header>
    <div class="content" id="content">
      <div id="content-placeholder"></div>
    </div>
  </div>
</div>
<script>
document.body.addEventListener('htmx:beforeSwap', function(e) {
  if (e.detail.target.id === 'content') {
    var links = document.querySelectorAll('.nav a');
    links.forEach(function(l) { l.classList.remove('active'); });
    var path = e.detail.pathInfo.requestPath;
    links.forEach(function(l) {
      if (l.getAttribute('href') === path) l.classList.add('active');
    });
    document.querySelector('.header h1').textContent =
      path === '/findings' ? 'Findings' : path === '/history' ? 'History' : 'Dashboard';
  }
});
document.addEventListener('DOMContentLoaded', function() {
  htmx.ajax('GET', '/overview', {target: '#content'});
});
</script>
</body>
</html>
