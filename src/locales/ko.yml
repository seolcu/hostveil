  sensitive:
    inline_secret:
      title: "서비스가 환경 변수에 시크릿을 하드코딩합니다"
      description: "%{service}가 민감한 변수 %{variable}를 environment에 직접 설정합니다."
      why: "inline 시크릿은 버전 관리, 백업, 프로세스 조회를 통해 쉽게 유출될 수 있습니다."
      fix: "시크릿을 Docker secrets, 외부 secret manager, 또는 버전 관리 밖의 보호된 env 파일로 옮기세요."
    default_credential:
      title: "서비스가 기본값 또는 빈 자격 증명을 사용합니다"
      description: "%{service}가 %{variable}에 기본값 또는 빈 자격 증명을 설정합니다."
      why: "기본 자격 증명은 널리 알려져 있으며 공격자가 가장 먼저 시도하는 경우가 많습니다."
      fix: "고유한 시크릿 값을 설정하고 가능하면 compose 파일 밖에서 관리하세요."
    env_file_secret:
      title: "참조된 env 파일에 평문 시크릿이 들어 있습니다"
      description: "%{service}가 평문 시크릿 값을 포함한 %{env_file}를 참조합니다."
      why: "평문 env 파일은 적절한 보호 없이 백업, 셸, 저장소로 자주 복사됩니다."
      fix: "시크릿을 Docker secrets로 옮기거나 env 파일을 보호하고 버전 관리에서 제외하세요."
  host:
    ssh_root_login:
      title: "SSH root 로그인이 활성화되어 있습니다"
      description: "%{path}에서 PermitRootLogin %{value}로 root 로그인을 허용합니다."
      why: "직접 root 로그인을 허용하면 공격자가 노릴 고가치 계정이 하나로 집중되고, 침해 후 추가 권한 경계도 사라집니다."
      fix: "%{path}를 수정하여 'PermitRootLogin no'로 설정하세요. 'sshd -t'로 문법을 검증한 뒤 'systemctl reload sshd'(또는 'service ssh reload')를 실행하세요. 연결을 끊기 전에 sudo 가능한 다른 계정이 있는지 반드시 확인하세요."
    ssh_password_auth:
      title: "SSH 비밀번호 인증이 활성화되어 있습니다"
      description: "%{path}에서 PasswordAuthentication yes를 활성화합니다."
      why: "비밀번호 기반 SSH 로그인은 키 기반 인증보다 무차별 대입, 피싱, 재사용 공격에 더 취약합니다."
      fix: "SSH 키 로그인이 가능한지 먼저 확인하세요. %{path}를 수정하여 'PasswordAuthentication no'로 설정하고, 'sshd -t' 후 SSH 서비스를 reload하세요. 키 인증이 확실할 때까지 기존 세션을 유지하세요."
    ssh_empty_passwords:
      title: "SSH가 빈 비밀번호를 허용합니다"
      description: "%{path}에서 PermitEmptyPasswords yes를 활성화합니다."
      why: "빈 비밀번호를 허용하면 로그인 가능한 계정 하나만 잘못 구성되어도 호스트가 매우 쉽게 침해될 수 있습니다."
      fix: "%{path}를 수정하여 'PermitEmptyPasswords no'로 설정하고, 'sshd -t' 후 SSH 서비스를 reload하세요. 'passwd -S'나 'chage -l'로 로컬 계정에 빈 비밀번호가 없는지 점검하세요."
    ssh_pubkey_auth:
      title: "SSH 공개키 인증이 비활성화되어 있습니다"
      description: "%{path}에서 PubkeyAuthentication no를 설정합니다."
      why: "공개키 인증을 끄면 관리자가 더 약한 비밀번호 기반 접근이나 감사하기 어려운 우회 수단에 의존하게 될 수 있습니다."
      fix: "%{path}를 수정하여 'PubkeyAuthentication yes'로 설정하고, 'sshd -t' 후 reload하세요. 비밀번호 인증을 끄기 전에 'ssh-copy-id'로 키를 등록하여 잠금 방지하세요."
    ssh_user_environment:
      title: "SSH가 사용자 제어 환경 파일을 허용합니다"
      description: "%{path}에서 PermitUserEnvironment yes를 활성화합니다."
      why: "SSH 사용자가 환경 변수를 주입할 수 있으면 제한된 명령 구성이 약해지고 로그인 후 예기치 않은 실행 경로가 생길 수 있습니다."
      fix: "%{path}를 수정하여 'PermitUserEnvironment no'로 설정하고, 'sshd -t' 후 reload하세요. 특정 키에 환경 파일이 필요하다면 AuthorizedKeysCommand나 ForceCommand를 대안으로 고려하세요."
    ssh_x11_forwarding:
      title: "SSH X11 포워딩이 활성화되어 있습니다"
      description: "%{path}에서 X11Forwarding yes가 설정되어 있습니다."
      why: "X11 포워딩은 SSH 세션 공격 표면을 넓히고 클라이언트의 디스플레이/세션 신뢰 경계를 원격 호스트까지 확장시킬 수 있습니다."
      fix: "%{path}를 수정하여 'X11Forwarding no'로 설정하고, 'sshd -t' 후 reload하세요. GUI 접근이 필요하면 원격 데스크톱이나 VPN 내 X 포워딩을 대안으로 고려하세요."
    ssh_weak_kex:
      title: "SSH가 약한 키 교환 알고리즘을 허용합니다"
      description: "%{path}에 약한 KexAlgorithms이 포함되어 있습니다: %{algorithms}."
      why: "diffie-hellman-group1-sha1 같은 약한 키 교환 알고리즘은 Logjam 스타일 공격과 다운그레이드 공격에 취약합니다."
      fix: "%{path}에서 KexAlgorithms의 약한 알고리즘을 제거하세요. curve25519-sha256, ecdh-sha2-nistp521, diffie-hellman-group-exchange-sha256을 우선적으로 사용하세요. 'sshd -t' 후 서비스를 reload하세요."
    ssh_weak_macs:
      title: "SSH가 약한 MAC 알고리즘을 허용합니다"
      description: "%{path}에 약한 MAC이 포함되어 있습니다: %{algorithms}."
      why: "hmac-md5 같은 약한 MAC 알고리즘은 현대 SSH 세션에 충분한 무결성 보호를 제공하지 않습니다."
      fix: "%{path}에서 MACs의 약한 알고리즘을 제거하세요. hmac-sha2-512-etm@openssh.com이나 hmac-sha2-256-etm@openssh.com을 우선적으로 사용하세요. 'sshd -t' 후 서비스를 reload하세요."
    ssh_weak_ciphers:
      title: "SSH가 약한 암호화를 허용합니다"
      description: "%{path}에 약한 Ciphers가 포함되어 있습니다: %{algorithms}."
      why: "arcfour나 3des-cbc 같은 약한 암호화는 알려진 암호분석 공격에 취약하고 적절한 기밀성을 제공하지 않습니다."
      fix: "%{path}에서 Ciphers의 약한 알고리즘을 제거하세요. chacha20-poly1305@openssh.com이나 aes256-gcm@openssh.com을 우선적으로 사용하세요. 'sshd -t' 후 서비스를 reload하세요."
    ssh_listen_all:
      title: "SSH가 모든 네트워크 인터페이스에서 수신 중입니다"
      description: "%{path}가 SSH를 모든 인터페이스에 바인딩합니다 (ListenAddress %{values})."
      description_default: "%{path}에 ListenAddress가 설정되지 않았으므로, SSH는 기본적으로 모든 인터페이스에 바인딩됩니다."
      why: "모든 인터페이스에 SSH를 노출하면 공격 표면이 늘어나며, 특히 공개되거나 신뢰할 수 없는 네트워크 세그먼트가 있는 호스트에서 위험합니다."
      fix: "%{path}에 'ListenAddress 127.0.0.1'(또는 관리 인터페이스 IP)를 추가하고, 'sshd -t' 후 reload하세요. 원격 접근이 필요하면 VPN이나 점프 호스트를 사용하는 것이 공개 SSH보다 안전합니다."
    docker_socket_world_writable:
      title: "Docker 소켓이 world writable 상태입니다"
      description: "%{path}가 mode %{mode}로 모든 로컬 사용자에게 쓰기 가능하게 열려 있습니다."
      why: "Docker 소켓에 쓰기 가능한 사용자는 컨테이너를 제어할 수 있고, 종종 호스트에서 root에 준하는 접근을 얻게 됩니다."
      fix: "'chmod 660 %{path}'와 'chown root:docker %{path}'(그룹은 환경에 맞게 조정)를 실행하세요. 'ls -l %{path}'로 확인하고, 'getent group docker'로 그룹원을 점검하세요."
    docker_socket_world_readable:
      title: "Docker 소켓이 world readable 상태입니다"
      description: "%{path}가 mode %{mode}로 모든 로컬 사용자에게 읽기 가능하게 열려 있습니다."
      why: "광범위한 읽기 권한은 민감한 런타임/이미지 메타데이터를 유출할 수 있으며, Docker 소켓 접근 제어가 약하다는 신호일 수 있습니다."
      fix: "'chmod 660 %{path}'와 'chown root:docker %{path}'를 실행하세요. 'ls -l %{path}'로 확인하고 docker 그룹에 의도된 관리자만 포함되어 있는지 확인하세요."
    docker_daemon_tcp_public:
      title: "Docker 데몬이 TCP 리스너를 노출합니다"
      description: "%{path}가 Docker가 non-local TCP host에 바인딩되도록 구성합니다."
      why: "공개되거나 넓게 도달 가능한 Docker API는 강하게 보호되지 않으면 원격 컨테이너 제어와 호스트 침해로 이어질 수 있습니다."
      fix: "%{path}에서 TCP host 항목을 제거하고 'unix:///var/run/docker.sock'만 남기세요. 'systemctl restart docker'로 적용하세요. 원격 접근이 필요하면 SSH 터널링이나 TLS 리버스 프록시를 사용하세요."
    docker_daemon_tcp_no_tlsverify:
      title: "Docker TCP 리스너에 TLS 클라이언트 검증이 없습니다"
      description: "%{path}가 tlsverify 없이 non-local TCP Docker host를 노출합니다."
      why: "강한 클라이언트 인증이 없는 원격 Docker API는 전체 컨테이너 제어를 허용할 수 있고, 종종 바로 호스트 침해로 이어집니다."
      fix: "가능하면 로컬 Unix 소켓을 사용하세요. TCP가 꼭 필요하면 'tlsverify': true를 설정하고 CA/클라이언트 인증서를 구성한 뒤, 방화벽이나 VPN으로 접근을 제한하세요. %{path} 수정 후 Docker를 restart하세요."
    docker_daemon_iptables_disabled:
      title: "Docker가 iptables 관리를 비활성화합니다"
      description: "%{path}가 daemon.json에서 iptables를 false로 설정합니다."
      why: "Docker의 iptables 통합을 끄면 게시된 포트와 컨테이너 네트워킹이 운영자 예상과 다른 방식으로 노출될 수 있습니다."
      fix: "%{path}에서 'iptables': false를 제거하거나 true로 설정한 뒤 'systemctl restart docker'를 실행하세요. 호스트 방화벽(ufw/firewalld) 규칙이 Docker NAT와 충돌하지 않는지 확인하세요."
    docker_not_rootless:
      title: "Docker가 rootless 모드로 실행되지 않고 있습니다"
      description: "Docker 데몬이 root 권한으로 실행 중입니다."
      why: "Rootless Docker는 데몬을 비특권 사용자로 실행해 공격 표면을 줄입니다. root로 실행하면 Docker 데몬 침해가 곧바로 호스트 root 접근으로 이어질 수 있습니다."
      fix: "Docker Rootless 모드 마이그레이션을 고려하세요. 공식 Docker 문서에서 rootless 설치 및 마이그레이션 단계를 참조하세요. 참고: 이는 가이드 변경이며 자동 수정은 아닙니다."
    docker_userns_remap_missing:
      title: "Docker 사용자 네임스페이스 재매핑이 구성되지 않았습니다"
      description: "%{path}에 userns-remap이 설정되지 않았습니다."
      why: "사용자 네임스페이스 재매핑 없이는 컨테이너 프로세스가 호스트 UID로 실행되어, 컨테이너 탈출 시 영향 범위가 커집니다."
      fix: "%{path}에 'userns-remap': 'default'를 추가하고 dockremap 사용자/subuid/subgid 매핑을 생성한 뒤 Docker를 재시작하세요."
    docker_live_restore_disabled:
      title: "Docker live-restore이 활성화되지 않았습니다"
      description: "%{path}에 live-restore이 true로 설정되지 않았습니다."
      why: "live-restore 없이는 Docker 데몬 재시작 시 모든 컨테이너가 중단되어 불필요한 다운타임과 데이터 손실이 발생할 수 있습니다."
      fix: "%{path}에 'live-restore': true를 추가한 뒤 'systemctl restart docker'를 실행하세요."
    docker_log_driver_missing:
      title: "Docker 로그 드라이버가 명시적으로 구성되지 않았습니다"
      description: "%{path}에 명시적인 log-driver이 설정되지 않았습니다."
      why: "기본 json-file 로그 드라이버는 무제한으로 증가하여 디스크 공간을 소진하고 로그 분석을 어렵게 합니다."
      fix: "%{path}에 'log-driver': 'json-file'과 'log-opts': { 'max-size': '10m', 'max-file': '3' }를 추가하거나, 'local' 같은 중앙 집중식 로그 드라이버를 사용하세요."
    docker_default_ulimits_missing:
      title: "Docker 기본 ulimits가 구성되지 않았습니다"
      description: "%{path}에 default-ulimits이 설정되지 않았습니다."
      why: "기본 ulimits이 없으면 비정상적으로 동작하는 컨테이너 하나가 호스트의 파일 디스크립터를 소진하거나 과도한 프로세스를 생성할 수 있습니다."
      fix: "%{path}에 'default-ulimits': { 'nofile': { 'Name': 'nofile', 'Hard': 64000, 'Soft': 64000 } }를 추가한 뒤 Docker를 재시작하세요."
    fail2ban_not_enabled:
      title: "Fail2ban이 설치되어 있지만 활성 상태가 아닙니다"
      description: "%{path}에서 로컬 Fail2ban 흔적이 보이지만, 활성화된 서비스 표시는 감지되지 않았습니다."
      why: "Fail2ban을 설치만 하고 서비스나 실제 jail을 활성화하지 않으면 반복 로그인 시도나 노이즈 스캔을 막지 못합니다."
      fix: "'systemctl enable --now fail2ban'으로 서비스를 활성화하세요. /etc/fail2ban/jail.local에 '[sshd] enabled = true' 같은 실제 jail을 구성하고, 'fail2ban-client status'로 동작을 확인하세요."
    defensive_controls_missing:
      title: "침입 방지 제어가 감지되지 않았습니다"
      description: "%{path}에서 Fail2ban의 로컬 흔적을 찾지 못했습니다."
      why: "기본적인 차단/ban 자동화는 반복 비밀번호 공격, 스캔, 기타 노이즈성 남용을 늦추는 데 도움이 됩니다."
      fix: "패키지 관리자로 Fail2ban을 설치하고 sshd jail을 활성화한 뒤 서비스를 시작하세요. 클라우드 방화벽이나 IDS를 사용 중이라면, 악성 트래픽을 실제로 차단하고 있는지 차단 로그를 점검하세요."
    ufw_disabled:
      title: "UFW가 설치되어 있지만 비활성화되어 있습니다"
      description: "%{path}에서 UFW가 존재하지만 ENABLED가 no로 설정되어 있습니다."
      why: "호스트 방화벽은 인바운드 노출을 줄이고, 실수로 공개된 서비스가 외부에서 접근 가능해지는 위험을 낮춥니다."
      fix: "'ufw default deny incoming && ufw default allow outgoing'을 실행한 뒤, 필요한 포트를 허용하세요(예: 'ufw allow 22/tcp'). 그런 다음 'ufw enable'을 실행하고 'ufw status verbose'로 확인하세요."
    ufw_default_input_policy_accept:
      title: "UFW 기본 인바운드 정책이 ACCEPT입니다"
      description: "%{path}에서 DEFAULT_INPUT_POLICY가 %{policy}로 설정되어 있습니다."
      why: "기본 정책이 ACCEPT이면 명시적 방화벽 규칙을 검토하기 전에 새로 노출된 서비스가 외부에서 접근 가능해질 수 있습니다."
      fix: "'ufw default deny incoming'을 실행한 뒤, 필요한 포트만 명시적으로 허용하세요(예: 'ufw allow 22/tcp'). 'ufw status verbose'로 확인하고, 원격 접근이 차단되지 않았는지 테스트한 뒤 세션을 종료하세요."
    unattended_upgrades_disabled:
      title: "자동 보안 업데이트가 비활성화되어 있습니다"
      description: "%{path}에서 unattended-upgrades가 비활성화되어 있습니다."
      why: "보안 업데이트가 적용되지 않으면 알려진 취약점이 의도보다 오래 방치될 수 있습니다."
      fix: "unattended-upgrades를 설치하고 'dpkg-reconfigure -plow unattended-upgrades'로 활성화하세요. Debian 계열이 아니면 동등한 예약 패치 워크플로를 구성하고, 'systemctl list-timers'나 cron 로그로 동작을 확인하세요."
    package_lists_auto_update_disabled:
      title: "자동 패키지 목록 새로고침이 비활성화되어 있습니다"
      description: "%{path}가 APT::Periodic::Update-Package-Lists를 비활성화합니다."
      why: "오래된 패키지 인덱스는 보안 패치 가시성을 지연시키고 자동 패치 기대를 약화시킬 수 있습니다."
      fix: "/etc/apt/apt.conf.d/20auto-upgrades에서 APT::Periodic::Update-Package-Lists를 1로 설정하거나, 'dpkg-reconfigure -plow unattended-upgrades'를 실행하세요. 'apt-config dump | grep Update-Package-Lists'로 확인하세요."
    dnf_automatic_disabled:
      title: "dnf-automatic 업데이트가 비활성화되어 있습니다"
      description: "%{path}의 [commands]에서 apply_updates가 비활성화되어 있습니다."
      why: "dnf-automatic이 없으면 Fedora/RHEL/Rocky 시스템이 수동 개입 전까지 보안 업데이트를 놓칠 수 있습니다."
      fix: "dnf-automatic을 설치('dnf install dnf-automatic')하고 %{path}에서 apply_updates = yes로 설정한 뒤, 'systemctl enable --now dnf-automatic.timer'로 타이머를 활성화하세요. 'systemctl list-timers | grep dnf-automatic'으로 확인하세요."
    dnf_automatic_timer_disabled:
      title: "dnf-automatic 타이머가 활성화되지 않았습니다"
      description: "%{path}는 존재하지만 dnf-automatic 타이머가 활성화되지 않았습니다."
      why: "apply_updates가 구성되어 있어도 타이머가 활성화되어야 예약된 업데이트가 실행됩니다."
      fix: "'systemctl enable --now dnf-automatic.timer'로 타이머를 활성화하세요. 'systemctl status dnf-automatic.timer'로 상태를 확인하세요."
    yum_cron_disabled:
      title: "yum-cron 업데이트가 비활성화되어 있습니다"
      description: "%{path}의 [commands]에서 apply_updates가 비활성화되어 있습니다."
      why: "yum-cron이 없으면 이전 RHEL 시스템이 수동 개입 전까지 보안 업데이트를 놓칠 수 있습니다."
      fix: "yum-cron을 설치하고 %{path}에서 apply_updates = yes로 설정한 뒤, 'systemctl enable --now yum-cron'으로 서비스를 시작하세요."
    yum_cron_service_disabled:
      title: "yum-cron 서비스가 활성화되지 않았습니다"
      description: "%{path}는 존재하지만 yum-cron 서비스가 활성화되지 않았습니다."
      why: "apply_updates가 구성되어 있어도 서비스가 활성화되어야 예약된 업데이트가 실행됩니다."
      fix: "'systemctl enable --now yum-cron'으로 서비스를 활성화하세요. 'systemctl status yum-cron'으로 상태를 확인하세요."
    kernel_aslr_disabled:
      title: "커널 ASLR이 비활성화되어 있습니다"
      description: "%{path}가 0으로 설정되어 주소 공간 배치 무작위화가 꺼져 있습니다."
      why: "ASLR은 프로세스 메모리 배치를 무작위화해 메모리 손상 익스플로잇을 어렵게 만듭니다. 비활성화하면 익스플로잇 성공 가능성이 크게 높아집니다."
      fix: "즉시 적용하려면 'sysctl -w kernel.randomize_va_space=2'를 실행하세요. /etc/sysctl.d/99-aslr.conf를 만들어 'kernel.randomize_va_space = 2'를 추가하면 재부팅 후에도 유지됩니다. 'sysctl kernel.randomize_va_space'로 확인하세요."
    kernel_syn_cookies_disabled:
      title: "TCP SYN 쿠키가 비활성화되어 있습니다"
      description: "%{path}가 0으로 설정되어 SYN 플러드 보호가 꺼져 있습니다."
      why: "SYN 쿠키가 없으면 호스트는 연결 상태 테이블을 고갈시키는 SYN 플러드 서비스 거부 공격에 더 취약합니다."
      fix: "즉시 적용하려면 'sysctl -w net.ipv4.tcp_syncookies=1'를 실행하세요. /etc/sysctl.d/99-syn-cookies.conf를 만들어 'net.ipv4.tcp_syncookies = 1'를 추가하면 영구화됩니다. 'sysctl net.ipv4.tcp_syncookies'로 확인하세요."
    kernel_broadcast_ping_allowed:
      title: "브로드캐스트 ICMP 에코 요청이 허용됩니다"
      description: "%{path}가 0으로 설정되어 브로드캐스트 핑 응답이 허용됩니다."
      why: "브로드캐스트 핑에 응답하면 네트워크 정찰과 증폭형 스캐닝을 촉진할 수 있습니다."
      fix: "즉시 적용하려면 'sysctl -w net.ipv4.icmp_echo_ignore_broadcasts=1'를 실행하세요. /etc/sysctl.d/99-icmp-broadcast.conf를 만들어 'net.ipv4.icmp_echo_ignore_broadcasts = 1'를 추가하면 영구화됩니다. 'sysctl net.ipv4.icmp_echo_ignore_broadcasts'로 확인하세요."
    kernel_ip_forward_enabled:
      title: "Docker 없이 IP 포워딩이 활성화되어 있습니다"
      description: "%{path}가 1로 설정되어 있고 로컬 Docker 소켓이 감지되지 않았습니다."
      why: "IP 포워딩은 호스트를 라우터로 만듭니다. Docker나 알려진 라우팅 역할 없이 활성화되면 낮부 트래픽 경로를 노출할 수 있습니다."
      fix: "즉시 적용하려면 'sysctl -w net.ipv4.ip_forward=0'를 실행하세요. /etc/sysctl.d/99-ip-forward.conf를 만들어 'net.ipv4.ip_forward = 0'를 추가하면 영구화됩니다. 이 호스트가 의도적으로 라우터라면 예외를 문서화하고 방화벽으로 라우팅을 제한하세요."
    kernel_unprivileged_userns_clone_enabled:
      title: "비특권 사용자 네임스페이스가 활성화되어 있습니다"
      description: "%{path}가 1로 설정되어 비특권 사용자가 새 네임스페이스를 만들 수 있습니다."
      why: "사용자 네임스페이스는 커널의 권한 상승 익스플로잇 공격 표면을 확대합니다. 컨테이너 런타임이 없는 호스트에서는 비특권 네임스페이스 생성이 보통 불필요합니다."
      fix: "즉시 적용하려면 'sysctl -w kernel.unprivileged_userns_clone=0'를 실행하세요. /etc/sysctl.d/99-userns.conf를 만들어 'kernel.unprivileged_userns_clone = 0'를 추가하면 영구화됩니다. 'sysctl kernel.unprivileged_userns_clone'로 확인하세요."
    kernel_max_user_namespaces_enabled:
      title: "사용자 네임스페이스가 제한되지 않았습니다"
      description: "%{path}가 %{value}로 설정되어 사용자 네임스페이스 생성이 허용됩니다."
      why: "양수 max_user_namespaces 제한은 비특권 사용자가 네임스페이스를 만들 수 있게 합니다. 이를 제한하거나 비활성화하면 비컨테이너 호스트의 커널 공격 표면이 줄어듭니다."
      fix: "'sysctl -w user.max_user_namespaces=0'로 사용자 네임스페이스를 완전히 비활성화하거나, 특정 비특권 컨테이너가 필요하면 작은 제한을 설정하세요. /etc/sysctl.d/99-userns.conf로 영구화하고 'sysctl user.max_user_namespaces'로 확인하세요."
    kernel_modules_disabled_not_set:
      title: "커널 모듈 로딩이 제한되지 않았습니다"
      description: "%{path}가 0으로 설정되어 커널 모듈을 제한 없이 로드할 수 있습니다."
      why: "제한 없는 모듈 로딩은 root나 물리적 접근 권한을 가진 공격자가 임의의 커널 코드를 로드할 수 있게 합니다. 이를 제한하면 커널 공격 표면이 줄어들고 특정 지속 기법을 어렵게 만듭니다."
      fix: "'sysctl -w kernel.modules_disabled=1'로 새 모듈 로딩을 방지하세요. /etc/sysctl.d/99-modules.conf를 만들어 'kernel.modules_disabled = 1'를 추가하면 영구화됩니다. 참고: 설정 전에 필요한 모듈을 모두 로드해야 하며, 재부팅 없이는 되돌릴 수 없습니다."
    kernel_module_signing_not_enforced:
      title: "커널 모듈 서명이 강제되지 않았습니다"
      description: "%{path}가 없거나 N으로 설정되어 서명되지 않은 커널 모듈을 로드할 수 있습니다."
      why: "모듈 서명 강제 없이는 침해당한 root 계정이나 물리적 접근 권한을 가진 공격자가 사용자 공간 보안 제어를 우회하는 악성 커널 모듈을 로드할 수 있습니다."
      fix: "커널 설정에서 CONFIG_MODULE_SIG_FORCE를 활성화하고 커널 커맨드 라인에 'module.sig_enforce=1'을 포함하세요. 대부분의 배포판에서는 커널을 재빌드하거나 서명된 커널 패키지를 설치해야 합니다."
    secure_boot_disabled:
      title: "UEFI Secure Boot가 비활성화되어 있습니다"
      description: "%{path}에서 Secure Boot가 활성화되지 않았음을 나타냅니다."
      why: "Secure Boot는 신뢰할 수 없는 부트로더와 커널 이미지의 로드를 방지합니다. 이 기능이 없으면 물리적 접근 권한이 있거나 부트로더가 침해당한 공격자가 OS 시작 전에 악성 코드를 주입할 수 있습니다."
      fix: "시스템의 UEFI 펌웨어 설정에서 Secure Boot를 활성화하세요. OS 부트로더와 커널이 신뢰할 수 있는 키로 서명되어 있는지 확인하세요."
    grub_password_missing:
      title: "GRUB 부트로더에 암호 보호가 없습니다"
      description: "%{path}에 GRUB 암호나 unrestricted 제한이 없습니다."
      why: "GRUB 암호가 없으면 물리적 또는 콘솔 접근 권한이 있는 누구나 부트 매개변수를 편집해 보안 제어를 우회하고, root 셸로 진입하거나, 부팅 시 SELinux/AppArmor를 비활성화할 수 있습니다."
      fix: "'grub-mkpasswd-pbkdf2'로 GRUB 암호를 설정한 뒤 해시를 /etc/grub.d/40_custom에 추가하고, 'update-grub'(Debian/Ubuntu) 또는 'grub2-mkconfig -o /boot/grub2/grub.cfg'(Fedora/RHEL)로 설정을 재생성하세요."
    shadow_permissions_weak:
      title: "/etc/shadow 권한이 너무 개방적입니다"
      description: "%{path}의 모드가 %{mode}로, 0640보다 개방적입니다."
      why: "/etc/shadow는 비밀번호 해시를 저장합니다. root가 아닌 사용자에게 읽기 권한이 있으면 공격자가 해시를 추출해 오프라인 크래킹을 시도할 수 있습니다."
      fix: "'chmod 640 %{path}'와 'chown root:shadow %{path}'(shadow 그룹이 없는 배포판은 root:root)를 실행하세요. 'ls -l %{path}'로 확인하세요."
    shadow_weak_hash:
      title: "/etc/shadow에 약한 비밀번호 해시가 포함되어 있습니다"
      description: "%{path}에 최소 한 계정이 %{algorithm} 해시를 사용하고 있습니다."
      why: "MD5나 unsalted 해시 같은 약한 알고리즘은 SHA-512나 yescrypt 같은 현대 알고리즘보다 수십 배 빠르게 크래킹될 수 있습니다."
      fix: "'passwd -e <username>'으로 해당 계정의 비밀번호 변경을 강제하세요. PAM이 강력한 알고리즘을 사용하도록 구성되어 있는지 확인하세요. Debian/Ubuntu는 /etc/pam.d/common-password, RHEL/Fedora는 /etc/pam.d/password-auth와 /etc/pam.d/system-auth를 점검하세요."
    shadow_empty_password:
      title: "/etc/shadow에 빈 비밀번호 필드가 있습니다"
      description: "%{path}에 최소 한 계정의 비밀번호 필드가 비어 있습니다."
      why: "비어 있는 비밀번호 필드는 해당 계정에 비밀번호 없이 로그인할 수 있음을 의미하며, 이는 매우 쉬운 침해 경로입니다."
      fix: "'passwd -l <username>'으로 해당 계정을 잠그거나 즉시 강력한 비밀번호를 설정하세요. /etc/passwd에서 불필요한 로그인 계정을 검토하고 비활성화 또는 삭제하세요."
    tmp_not_tmpfs:
      title: "/tmp가 tmpfs로 마운트되지 않았습니다"
      description: "/tmp가 영구적인 파일시스템에 마운트되어 있어, 재부팅 후에도 데이터가 남습니다."
      why: "영속적인 /tmp는 공격자가 악성 파일을 재부팅 후에도 남겨두고, 다른 사용자에게 임시 데이터를 유출할 수 있게 합니다. tmpfs 기반 /tmp는 재부팅 시 정리되고 지속성 남용을 어렵게 만듭니다."
      fix: "/etc/fstab에 'tmpfs /tmp tmpfs defaults,noexec,nosuid,nodev,size=1G 0 0' 줄을 추가하세요. 그런 다음 'systemctl daemon-reexec'와 'mount -a'를 실행하세요. 'findmnt /tmp'로 확인하세요."
    tmp_tmpfs_flags_missing:
      title: "/tmp tmpfs에 하드닝 플래그가 누락되었습니다"
      description: "/tmp tmpfs 마운트에 다음 플래그가 없습니다: %{flags}."
      why: "noexec, nosuid, nodev 같은 마운트 플래그는 /tmp에서 공격자가 페이로드를 실행하거나, setuid 바이너리로 권한을 상승시키거나, 특수 장치 파일을 만들 수 있는 것을 방지합니다."
      fix: "/etc/fstab의 /tmp 줄에 누락된 플래그를 추가하세요(예: 'tmpfs /tmp tmpfs defaults,noexec,nosuid,nodev,size=1G 0 0'). 'mount -o remount,noexec,nosuid,nodev /tmp'로 즉시 적용하세요. 'findmnt /tmp'로 확인하세요."
    selinux_permissive:
      title: "SELinux가 permissive 모드입니다"
      description: "%{path}가 SELINUX를 permissive로 설정했습니다."
      why: "Permissive 모드는 정책 위반을 기록하지만 강제하지 않아, 호스트가 임의 접근 제어 보호만으로 남게 됩니다."
      fix: "/etc/selinux/config에서 SELINUX=enforcing으로 설정하세요. 즉시 전환하려면 'setenforce 1'(지원 시)를 실행하세요. 필요하면 'semodule -B'로 정책을 재구성한 뒤 재부팅하세요. 변경 후 /var/log/audit/audit.log에서 denial을 모니터링하세요."
    selinux_disabled:
      title: "SELinux가 비활성화되어 있습니다"
      description: "%{path}가 SELINUX를 disabled로 설정했습니다."
      why: "SELinux를 비활성화하면 강제 접근 제어가 완전히 제거되어, 시스템 프로세스와 컨테이너에 사용할 수 있는 방어 깊이가 줄어듭니다."
      fix: "/etc/selinux/config에서 SELINUX=enforcing으로 설정하고 'semodule -B'로 정책을 재구성한 뒤 재부팅하세요. SSH와 Docker 같은 중요 서비스가 정상 시작하는지 확인하세요. denial이 보이면 audit 로그를 검토하고 프로덕션 적용 전 정책을 조정하세요."
    apparmor_complain_mode:
      title: "AppArmor 프로필이 complain 모드입니다"
      description: "%{path}에 complain 모드의 프로필이 하나 이상 존재합니다."
      why: "Complain 모드는 정책 위반을 기록하지만 차단하지 않아, 침핵된 서비스가 강화된 프로필이 거부할 행위를 여전히 수행할 수 있습니다."
      fix: "'aa-enforce /etc/apparmor.d/profile.name'로 테스트된 프로필을 enforce 모드로 전환하세요. /var/log/syslog나 journald에서 denial을 먼저 확인하고, 스테이징 환경에서 하나씩 적용하세요."
    apparmor_profile_missing:
      title: "%{service}의 AppArmor 프로필이 없습니다"
      description: "%{path}에 %{service}에 대한 enforced 프로필이 없습니다."
      why: "%{service}를 AppArmor 프로필 없이 실행하면 강제 접근 제어 계층이 제거되어, 침핵된 프로세스가 파일과 시스템 호출에 더 자유롭게 접근할 수 있습니다."
      fix: "%{service}에 대한 AppArmor 프로필을 설치하거나 활성화하세요. Debian/Ubuntu에서는 'apparmor-profiles'나 배포판별 패키지(예: 'apparmor-profile-docker')를 확인하세요. 'apparmor_parser /etc/apparmor.d/profile.name'로 로드하고 'aa-status'로 확인하세요."
    mac_framework_missing:
      title: "강제 접근 제어 프레임워크가 감지되지 않았습니다"
      description: "%{path}에 SELinux 또는 AppArmor 설치 마커가 없습니다."
      why: "강제 접근 제어 프레임워크는 기존 Unix 권한을 넘어 방어 깊이를 추가합니다. 이들이 없으면 침핵된 프로세스에 대한 제약이 줄어듭니다."
      fix: "Debian/Ubuntu는 'apt install apparmor apparmor-profiles'로, RHEL/Fedora는 SELinux를 활성화하세요('setenforce 1'). 설치 후 중요 컨테이너와 서비스가 제한된 프로필 하에서 실행되는지 확인하세요."
    mount_flags_missing:
      title: "민감한 마운트에 하드닝 플래그가 없습니다"
      description: "%{mount_point}에 다음 플래그가 누락되었습니다: %{flags}."
      why: "noexec, nosuid, nodev 같은 마운트 플래그는 해당 파티션에서 무엇을 실행하거나 권한을 상승시킬 수 있는지 제한합니다. 민감한 디렉터리에서 이들이 없으면 침해 시 영향 범위가 커집니다."
      fix: "/etc/fstab에서 %{mount_point}에 누락된 플래그를 추가하세요(예: 'defaults,noexec,nosuid,nodev'). 'mount -o remount,noexec,nosuid,nodev %{mount_point}'로 즉시 적용하세요. 'findmnt %{mount_point}'나 'mount | grep %{mount_point}'로 확인하세요. /boot를 변경하기 전에 백업 부팅 매체를 준비하세요."
    proc_hidepid_missing:
      title: "/proc에 hidepid가 설정되지 않았습니다"
      description: "/proc 마운트에 hidepid 옵션이 없습니다."
      why: "hidepid가 없으면 모든 로컬 사용자가 실행 중인 프로세스를 열거하고 명령줄을 수집하며 다른 사용자의 활동을 식별할 수 있습니다. 이는 운영 메타데이터를 유출하고 공격자가 시스템을 매핑하는 데 도움을 줍니다."
      fix: "/etc/fstab의 /proc 줄에 'hidepid=2'를 추가하세요(예: 'proc /proc proc defaults,hidepid=2'). 'mount -o remount,hidepid=2 /proc'로 적용하세요. /proc 전체 접근에 의존하는 모니터링이나 관리 도구가 여전히 정상 작동하는지 확인하세요."
    proc_hidepid_weak:
      title: "/proc hidepid가 약한 값으로 설정되어 있습니다"
      description: "/proc 마운트에 hidepid가 설정되어 있지만 제한적인 값은 아닙니다."
      why: "hidepid=1은 다른 사용자의 프로세스 ID만 숨기고, hidepid=2는 /proc/PID 디렉터리 낮의 프로세스 메타데이터도 추가로 숨깁니다. 더 강력한 설정이 정보 유출을 더 효과적으로 줄입니다."
      fix: "/etc/fstab의 /proc 마운트 옵션을 'hidepid=2'로 변경하고 'mount -o remount,hidepid=2 /proc'로 적용하세요. 변경을 영구화하기 전에 모니터링과 관리 워크플로가 정상 작동하는지 검증하세요."
    systemd_hardening_missing:
      title: "Systemd 서비스에 하드닝 지시문이 없습니다"
      description: "%{service}에 다음 하드닝 마커가 누락되었습니다: %{flags}."
      why: "NoNewPrivileges, ProtectSystem, ProtectHome, PrivateTmp 같은 Systemd 지시문은 서비스 런타임을 제한하고 서비스가 침핵되었을 때의 영향 범위를 줄입니다. 이들이 없으면 더 많은 호스트 리소스가 노출됩니다."
      fix: "%{service}를 수정하여 [Service] 아래 누락된 지시문을 추가하세요. NoNewPrivileges=true와 PrivateTmp=true부터 시작하고 테스트하세요. ProtectSystem=strict와 ProtectHome=true는 서비스가 정상 시작하고 작동하는지 검증한 뒤 추가하세요. 수정 후 'systemctl daemon-reload && systemctl restart %{service}'를 실행하세요."
    firewalld_installed_but_disabled:
      title: "Firewalld가 설치되어 있지만 비활성화되어 있습니다"
      description: "Firewalld가 %{path}에 존재하지만 서비스가 활성화되지 않았습니다."
      why: "호스트 방화벽은 인바운드 노출을 줄이는 데 도움이 됩니다. Firewalld를 설치만 하고 활성화하지 않으면 호스트에 활성 방화벽 정책이 없는 상태가 됩니다."
      fix: "'systemctl enable --now firewalld'로 Firewalld를 활성화하세요. 필요한 zone과 service를 구성한 뒤(예: 'firewall-cmd --permanent --add-service=ssh'), 'firewall-cmd --reload'를 실행하세요. 'firewall-cmd --state'로 상태를 확인하세요."
    firewalld_default_zone_trusted:
      title: "Firewalld 기본 zone이 trusted입니다"
      description: "%{path}가 DefaultZone을 %{zone}로 설정했습니다."
      why: "trusted zone은 기본적으로 모든 트래픽을 허용하므로, 들어오는 연결에 대한 방화벽 보호가 사실상 비활성화됩니다."
      fix: "%{path}에서 기본 zone을 'public'이나 더 제한적인 사용자 정의 zone으로 변경하세요. 그런 다음 'firewall-cmd --set-default-zone=public'과 'firewall-cmd --reload'를 실행하세요. 'firewall-cmd --list-services'로 허용된 서비스를 확인하세요."
    nftables_installed_no_rules:
      title: "nftables가 설치되어 있지만 규칙이 없습니다"
      description: "%{path}의 nftables 설정이 비어 있습니다."
      why: "빈 nftables 규칙 세트는 패킷 필터링이 활성화되지 않았음을 의미하므로, 호스트가 원치 않는 트래픽에 노출됩니다."
      fix: "%{path}에 기본 nftables 규칙 세트를 정의하세요(예: 기본적으로 들어오는 트래픽을 차단하고 established/related 연결과 필요한 포트만 허용). 'nft -f %{path}'로 로드하고 'systemctl enable --now nftables'로 서비스를 활성화하세요."
    no_firewall_detected:
      title: "호스트 방화벽이 감지되지 않았습니다"
      description: "UFW, Firewalld, nftables 설치 마커를 찾을 수 없습니다."
      why: "호스트 방화벽이 없으면 실수로 공개 인터페이스나 포트에 바인딩된 서비스가 즉시 외부에서 접근 가능해지며, 횡적 이동을 제어하기 어렵습니다."
      fix: "호스트 방화벽을 설치하고 활성화하세요. Debian/Ubuntu는 UFW('apt install ufw')를, Fedora/RHEL/Rocky는 Firewalld('dnf install firewalld')를 사용하세요. 고급 설정에는 nftables를 직접 구성하세요. 활성화 전에 필요한 포트만 허용하세요."
    fim_missing:
      title: "파일 무결성 모니터링 도구가 감지되지 않았습니다"
      description: "AIDE, Tripwire, Samhain, OSSEC 설치 마커를 찾을 수 없습니다."
      why: "파일 무결성 모니터링이 없으면 침해 후 중요 시스템 파일의 무단 변경이 눈에 띄지 않아 탐지와 대응이 지연될 수 있습니다."
      fix: "AIDE('apt install aide' 또는 'dnf install aide')나 Tripwire를 설치하고 데이터베이스를 초기화한 뒤, cron이나 systemd timer로 정기 검사를 예약하세요."
    aide_not_initialized:
      title: "AIDE가 설치되었으나 초기화되지 않았습니다"
      description: "AIDE 설치 마커는 있지만 AIDE 데이터베이스가 존재하지 않습니다."
      why: "초기화되지 않은 AIDE는 기준 데이터베이스가 없어 파일 변경을 탐지할 수 없습니다."
      fix: "'aideinit'(Debian/Ubuntu) 또는 'aide --init'(Fedora/RHEL)으로 기준 데이터베이스를 생성한 뒤, 'aide --check'를 cron이나 systemd timer로 예약하세요."
    tripwire_not_initialized:
      title: "Tripwire가 설치되었으나 초기화되지 않았습니다"
      description: "Tripwire 설치 마커는 있지만 Tripwire 데이터베이스가 존재하지 않습니다."
      why: "초기화되지 않은 Tripwire는 정책 데이터베이스가 생성되지 않아 파일 변경을 탐지할 수 없습니다."
      fix: "정책 파일을 구성한 뒤 'tripwire --init'으로 데이터베이스를 생성하고, 주기적 무결성 검사를 예약하세요."
  runtime:
    seccomp_unconfined:
      title: "컨테이너가 seccomp를 비활성화했습니다"
      description: "%{service}가 seccomp를 unconfined로 설정하여 시스템 호출 필터링을 제거합니다."
      why: "seccomp를 비활성화하면 중요한 런타임 샌드박스 계층이 사라져 컨테이너가 모든 시스템 호출을 사용할 수 있게 되고, 컨테이너 탈출의 영향력이 커집니다."
      fix: "security_opt에서 seccomp:unconfined를 제거하세요. 특정 시스템 호출이 필요한 경우, 필터링을 완전히 비활성화하는 대신 해당 호출만 허용하는 사용자 정의 seccomp 프로필을 만드세요."
    seccomp_missing:
      title: "컨테이너에 명시적인 seccomp 프로필이 없습니다"
      description: "%{service}가 명시적인 seccomp 프로필을 설정하지 않았습니다."
      why: "Docker의 기본 seccomp 프로필이 위험한 시스템 호출을 차단하지만, 명시적으로 프로필을 선언하면 보안 태세가 의도적이고 감사하기 쉬워집니다."
      fix: "security_opt에 명시적인 seccomp 프로필을 추가하거나, 이 서비스에 기본 프로필이 적절하다는 것을 문서화하세요."
    dangerous_capabilities:
      title: "컨테이너에 위험한 Linux capabilities가 추가되었습니다"
      description: "%{service}가 다음의 고위험 capabilities를 추가합니다: %{capabilities}."
      why: "NET_ADMIN, SYS_ADMIN, SYS_PTRACE, SYS_MODULE, DAC_READ_SEARCH 같은 capabilities는 침핸된 컨테이너가 호스트에서 수행할 수 있는 작업의 범위를 크게 확장하며, 특권 모드에 근접한 위험을 만듭니다."
      fix: "cap_add에서 불필요한 capabilities를 제거하세요. 정말 필요하다면, 다른 방식으로 제한(AppArmor/SELinux, 읽기 전용 rootfs, drop-all-then-add)하고 그 근거를 문서화하세요."
    no_new_privileges_disabled:
      title: "컨테이너가 권한 상승을 허용합니다"
      description: "%{service}가 security_opt에 no-new-privileges:true를 설정하지 않았습니다."
      why: "no-new-privileges가 없으면 컨테이너 낸부 프로세스가 setuid 바이너리나 파일 capabilities를 통해 추가 capabilities를 획득할 수 있어, 침해의 영향력이 커집니다."
      fix: "이 서비스의 compose 파일 security_opt에 'no-new-privileges:true'를 추가하세요."
  vaultwarden:
    signups_enabled:
      title: "Vaultwarden 가입이 계속 활성화되어 있습니다"
      description: "%{service}가 SIGNUPS_ALLOWED=true를 설정합니다."
      why: "초기 설정 이후에도 공개 가입을 열어두면 원치 않는 계정이 생성되기 쉬워지고, 비밀번호 관리자 서비스의 공개 공격 표면이 넓어집니다."
      fix: "초기 온보딩이 끝나면 가입을 비활성화하거나, 초대 기반 계정 생성 절차로 제한하세요."
    admin_surface_public:
      title: "Vaultwarden 관리자 화면이 공개 바인딩에서 접근 가능합니다"
      description: "%{service}가 공개 인터페이스에 게시된 상태에서 admin token을 활성화합니다."
      why: "공개 접근 가능한 Vaultwarden 배포에서 관리자 페이지가 열려 있으면, 고가치 관리 표면이 탐지, 무차별 대입, 자격 증명 유출 위험에 노출됩니다."
      fix: "Vaultwarden을 리버스 프록시 뒤나 localhost 전용 바인딩 뒤에 두고, 관리자 페이지를 공용 인터넷에 노출하지 마세요."
    insecure_domain:
      title: "Vaultwarden DOMAIN이 공개 HTTP로 설정되어 있습니다"
      description: "%{service}가 DOMAIN=%{domain}을 설정하지만, 이는 HTTPS 기반 URL이 아닙니다."
      why: "Vaultwarden은 중요한 웹 기능에 안전한 컨텍스트를 기대하며, 공개 HTTP base URL은 비밀번호 관리자 배포의 전송 보안을 약화시킵니다."
      fix: "리버스 프록시에서 TLS를 종료하고 DOMAIN을 외부 HTTPS base URL로 설정하세요."
  jellyfin:
    insecure_published_url:
      title: "Jellyfin Published URL이 공개 HTTP를 사용합니다"
      description: "%{service}가 JELLYFIN_PublishedServerUrl=%{url}을 설정하지만, HTTPS URL이 아닙니다."
      why: "외부 URL이 HTTP인 미디어 서비스는 전송 보안이 약해지고, 클라이언트가 비보안 또는 혼합 콘텐츠 경로로 접근하기 쉬워집니다."
      fix: "Jellyfin을 HTTPS로 노출하고, JELLYFIN_PublishedServerUrl을 클라이언트가 보는 외부 HTTPS URL로 설정하세요."
    discovery_public:
      title: "Jellyfin autodiscovery 포트가 공개 접근 가능합니다"
      description: "%{service}가 autodiscovery 포트 %{port}를 게시합니다."
      why: "공개된 autodiscovery 포트는 미디어 서버의 존재를 더 쉽게 드러내며, 신뢰된 로컬 네트워크 밖에서는 대개 필요하지 않습니다."
      fix: "autodiscovery 포트를 로컬 네트워크로 제한하거나, 좁게 바인딩하거나, 필요하지 않다면 공개 게시를 비활성화하세요."
    media_mount_writable:
      title: "Jellyfin 미디어 라이브러리가 쓰기 가능하게 마운트됩니다"
      description: "%{service}가 %{path}를 read-only 보호 없이 마운트합니다."
      why: "미디어 라이브러리에 쓰기 권한을 주면 침해 시 영향이 커지고, 실수 또는 악의적 파일 변경도 쉬워집니다."
      fix: "Jellyfin이 해당 경로에 실제로 쓰기 권한이 필요하지 않다면 read-only로 마운트하세요."
  gitea:
    web_and_ssh_public:
      title: "Gitea가 웹과 SSH 표면을 모두 공개합니다"
      description: "%{service}가 웹 UI와 Git-over-SSH 엔드포인트를 모두 공개 인터페이스에 직접 노출합니다."
      why: "사용자 대상 표면을 둘 다 직접 게시하면 공격 표면이 넓어지고, 프록시/인증/속도 제한 보호를 놓치기 쉬워집니다."
      fix: "웹 UI는 리버스 프록시 또는 좁은 바인딩을 우선하고, SSH는 의도적으로 필요한 경우에만 노출하세요."
    ssh_published_public:
      title: "Gitea SSH 엔드포인트가 공개 접근 가능합니다"
      description: "%{service}가 Git-over-SSH 포트 %{port}를 게시합니다."
      why: "공개 SSH 엔드포인트는 웹 UI가 하드닝되어 있어도 별도의 공격 표면이 되며, 무차별 대입과 열거를 유발할 수 있습니다."
      fix: "SSH 노출을 의도한 네트워크로 제한하고, 키 기반 인증을 사용하며, HTTPS clone/push로 충분하다면 공개 게시를 피하세요."
    inline_security_secrets:
      title: "Gitea 앱 시크릿이 Compose에 하드코딩되어 있습니다"
      description: "%{service}가 %{variables}를 environment에 직접 설정합니다."
      why: "Gitea 보안 토큰을 Compose에 inline으로 두면 저장소, 백업, 프로세스 조회를 통해 유출되기 쉬우며, 문서화된 __FILE 기반 시크릿 경로도 활용하지 못합니다."
      fix: "Gitea 보안 시크릿을 파일 또는 secrets backend로 옮기고, 민감한 값에는 문서화된 __FILE 설정 경로를 우선 사용하세요."
  immich:
    shared_secret_env_file:
      title: "Immich가 하나의 secret env 파일을 여러 서비스와 공유합니다"
      description: "%{service}가 속한 Immich 스택에서 %{env_file}이 여러 서비스에 재사용되고 있으며, secret 값을 포함합니다."
      why: "서버와 머신러닝 서비스가 하나의 평문 env 파일을 공유하면, 그 파일이 복사되거나 유출되거나 과도하게 마운트될 때 영향 범위가 커집니다."
      fix: "가능하면 민감 값을 서비스별로 분리하고, DB 자격 증명 같은 고가치 시크릿은 더 안전한 전달 경로로 옮기세요."
    default_db_password:
      title: "Immich 스택이 기본 DB 비밀번호를 유지합니다"
      description: "%{service}가 속한 Immich 배포가 여전히 기본 DB_PASSWORD 값을 사용합니다."
      why: "기본 DB 비밀번호를 그대로 두면 스택이나 env 파일이 노출되었을 때 저장소 백엔드가 더 쉽게 침해될 수 있습니다."
      fix: "배포하거나 외부에 노출하기 전에 DB 비밀번호를 고유한 랜덤 값으로 바꾸세요."
  nextcloud:
    insecure_overwriteprotocol:
      title: "Nextcloud overwrite protocol이 HTTP로 설정되어 있습니다"
      description: "%{service}가 공개 노출된 상태에서 OVERWRITEPROTOCOL=%{protocol}을 사용합니다."
      why: "공개된 Nextcloud에서 HTTP overwrite protocol을 사용하면 전송 보안이 약해지고 로그인 또는 세션 트래픽이 비보안 경로로 노출될 수 있습니다."
      fix: "서비스를 외부에 노출하기 전에 OVERWRITEPROTOCOL을 https로 설정하고, 리버스 프록시 또는 엣지에서 TLS를 종료하세요."
    wildcard_trusted_domains:
      title: "Nextcloud trusted domains에 와일드카드형 호스트가 포함되어 있습니다"
      description: "%{service}가 NEXTCLOUD_TRUSTED_DOMAINS=%{trusted_domains}를 사용하며, 와일드카드형 항목이 포함되어 있습니다."
      why: "과도하게 넓은 trusted domain 매칭은 Host 헤더 악용 가능성을 높이고 의도하지 않은 호스트명 요청을 허용할 위험이 있습니다."
      fix: "NEXTCLOUD_TRUSTED_DOMAINS에는 관리하는 정확한 호스트명만 명시하고, * 또는 *.example.com 같은 값은 제거하세요."
    default_admin_credentials:
      title: "Nextcloud가 기본 관리자 초기 자격 증명을 사용하고 있습니다"
      description: "%{service}가 NEXTCLOUD_ADMIN_USER와 NEXTCLOUD_ADMIN_PASSWORD를 기본값에 가까운 값으로 유지하고 있습니다."
      why: "기본 초기 자격 증명은 널리 알려져 있어, 초기 하드닝 전에 설정 엔드포인트가 노출되면 빠르게 악용될 수 있습니다."
      fix: "초기 설정 시 고유한 관리자 계정과 강력한 랜덤 비밀번호를 사용하고, 이후에는 더 안전한 외부 시크릿 경로로 자격 증명을 교체하세요."
  traefik:
    insecure_api_enabled:
      title: "Traefik 비보안 API가 활성화되어 있습니다"
      description: "%{service}가 TRAEFIK_API_INSECURE=true를 설정해 TLS나 인증 없이 API와 대시보드를 노출합니다."
      why: "비보안 API는 Traefik 대시보드와 API의 전송 및 인증 보호를 제거해, 누구나 쉽게 발견하고 악용할 수 있게 만듭니다."
      fix: "TRAEFIK_API_INSECURE을 비활성화하세요. 대시보드는 TLS와 기본 인증 또는 IP 화이트리스트 미들웨어가 적용된 안전한 엔드포인트를 통해 접근하세요."
    dashboard_public:
      title: "Traefik 대시보드가 공개 바인딩에 활성화되어 있습니다"
      description: "%{service}가 포트를 공개 인터페이스에 게시하면서 대시보드를 활성화했습니다."
      why: "공개적으로 접근 가능한 Traefik 대시보드는 라우팅 설정, 상태, 메트릭을 노출해 정찰 및 대상 공격에 도움을 줄 수 있습니다."
      fix: "대시보드를 localhost 또는 관리 네트워크로 제한하거나, 안전한 엔드포인트를 통해 인증과 TLS로 보호하세요."
  portainer:
    admin_ui_public:
      title: "Portainer 관리 UI가 공개적으로 노출되어 있습니다"
      description: "%{service}가 Portainer 관리 인터페이스를 %{port}에 노출하고 있습니다."
      why: "공개적으로 접근 가능한 Portainer UI는 컨테이너와 호스트를 완전히 관리할 수 있는 권한을 제공하므로, 인증되거나 악용된 공격자에게 매우 높은 가치를 갖는 대상입니다."
      fix: "Portainer를 localhost, 관리 VPN, 또는 강력한 인증이 적용된 리버스 프록시로 제한하세요. 관리 포트를 인터넷에 직접 게시하지 마세요."
    docker_socket_mounted:
      title: "Portainer가 Docker 소켓을 마운트했습니다"
      description: "%{service}가 호스트 Docker 소켓을 컨테이너에 바인딩했습니다."
      why: "Docker 소켓에 접근 가능한 컨테이너는 컨테이너를 생성, 수정, 삭제할 수 있으며, 종종 호스트의 루트 수준 권한으로 에스컬레이션할 수 있습니다."
      fix: "Docker 소켓 마운트가 필수인지 검토하세요. Portainer Agent를 사용 중이라면 Portainer CE/EE 컨테이너에서 직접 소켓 마운트를 제거하는 것을 고려하세요."
    auth_disabled:
      title: "Portainer 인증이 비활성화되어 있습니다"
      description: "%{service}가 --no-auth 옵션으로 실행되어 내장 인증이 꺼져 있습니다."
      why: "인증 없이 Portainer를 실행하면 UI에 접근할 수 있는 누구나 자격 증명 없이 컨테이너, 이미지, 호스트 리소스를 관리할 수 있습니다."
      fix: "--no-auth를 제거하고 내장 인증을 활성화하거나, 리버스 프록시를 통해 외부 ID 공급자를 연동하세요."
  homeassistant:
    ui_public:
      title: "Home Assistant UI가 공개적으로 노출되어 있습니다"
      description: "%{service}가 Home Assistant 웹 인터페이스를 %{port}에 노출하고 있습니다."
      why: "공개적으로 접근 가능한 Home Assistant 인스턴스는 공격 표면을 늘리고, 스마트 홈 제어, 칩라 피드, 자동화 로직을 노출할 수 있습니다."
      fix: "Home Assistant를 localhost 또는 강력한 인증이 적용된 리버스 프록시로 제한하고, 포트 8123을 인터넷에 직접 게시하지 마세요."
    host_network:
      title: "Home Assistant가 호스트 네트워킹을 사용합니다"
      description: "%{service}가 network_mode를 host로 설정했습니다."
      why: "호스트 네트워킹은 네트워크 격리를 제거하고, 특히 발견 프로토콜에서 의도보다 더 많은 포트와 멀티캐스트 트래픽을 노출할 수 있습니다."
      fix: "문서화된 필요가 없는 한 브리지 네트워킹을 사용하고, 불필요한 발견 통합 구성 요소를 비활성화하세요."
    device_mount:
      title: "Home Assistant가 호스트 디바이스를 마운트했습니다"
      description: "%{service}가 호스트 디바이스 %{path}를 컨테이너에 마운트했습니다."
      why: "디바이스 마운트는 시리얼 포트, USB 라디오, 블루투스 어댑터를 컨테이너에 노출해, 침해 발생 시 영향을 키울 수 있습니다."
      fix: "디바이스 마운트가 필요한지 검토하세요. 불필요한 디바이스 마운트를 제거하고, 필요한 하드웨어에 대한 접근만 최소화하세요."
  pihole:
    admin_public:
      title: "Pi-hole 관리 인터페이스가 공개적으로 노출되어 있습니다"
      description: "%{service}가 Pi-hole 웹 관리 페이지를 %{port}에 노출하고 있습니다."
      why: "공개적으로 접근 가능한 Pi-hole 관리 인터페이스는 누구나 차단 목록, 쿼리 로그를 확인하고 DNS 설정을 변경할 수 있게 합니다."
      fix: "Pi-hole 관리 인터페이스를 localhost 또는 신뢰할 수 있는 네트워크로 제한하거나, 인증이 적용된 리버스 프록시 뒤에 배치하세요."
    weak_password:
      title: "Pi-hole이 약한 웹 비밀번호를 사용하고 있습니다"
      description: "%{service}가 WEBPASSWORD를 약하거나 기본값으로 설정했습니다."
      why: "약하거나 기본 Pi-hole 관리자 비밀번호는 공격자가 DNS 필터링 관리 권한을 획득하고 네트워크 쿼리 기록을 엿보기 쉽게 만듭니다."
      fix: "Compose 파일이나 외부 시크릿에 강력하고 고유한 WEBPASSWORD를 설정하고, 정기적으로 교체하세요."
    no_password:
      title: "Pi-hole에 웹 비밀번호가 설정되지 않았습니다"
      description: "%{service}가 WEBPASSWORD를 설정하지 않아 관리 인터페이스가 보호되지 않습니다."
      why: "웹 비밀번호가 없으면 Pi-hole 관리 인터페이스에 접근할 수 있는 누구나 DNS 설정을 변경하고, 차단을 비활성화하며, 쿼리 로그를 볼 수 있습니다."
      fix: "강력한 WEBPASSWORD 환경 변수를 설정하거나 외부 시크릿을 사용해 Pi-hole 관리 인터페이스를 보호하세요."
    dns_public:
      title: "Pi-hole DNS가 공개 인터페이스에 노출되어 있습니다"
      description: "%{service}가 DNS 포트를 %{port}에 공개 인터페이스에 게시했습니다."
      why: "DNS를 공개 인터넷에 노출하면 호스트가 오픈 리졸버가 되어 DNS 증폭 공격과 무단 사용을 유발할 수 있습니다."
      fix: "DNS 포트 53을 LAN IP 또는 localhost에 바인딩하세요. 의도적으로 공개 DNS 리졸버를 운영하지 않는 한 rate limiting과 로깅을 함께 적용하세요."
  grafana:
    admin_public:
      title: "Grafana 관리 인터페이스가 공개적으로 노출되어 있습니다"
      description: "%{service}가 Grafana 관리 UI를 %{port}에 노출하고 있습니다."
      why: "공개적으로 접근 가능한 Grafana 관리 인터페이스는 누구나 모니터링 대시보드와 관리 설정에 접근할 수 있게 합니다."
      fix: "Grafana를 localhost 또는 신뢰할 수 있는 네트워크로 제한하거나, 인증이 적용된 리버스 프록시 뒤에 배치하세요."
    auth_disabled:
      title: "Grafana 인증이 비활성화되어 있습니다"
      description: "%{service}가 GF_AUTH_DISABLE_LOGIN_FORM을 통해 로그인 폼을 비활성화했습니다."
      why: "Grafana 인증을 비활성화하면 모든 접근 제어가 제거되어, 누구나 대시보드와 데이터 소스를 보고 수정할 수 있습니다."
      fix: "GF_AUTH_DISABLE_LOGIN_FORM을 제거하거나 false로 설정하고, GF_SECURITY_ADMIN_PASSWORD를 강력한 비밀번호로 설정하세요."
    anonymous_access:
      title: "Grafana 익명 접근이 활성화되어 있습니다"
      description: "%{service}가 GF_AUTH_ANONYMOUS_ENABLED를 통해 익명 접근을 활성화했습니다."
      why: "익명 접근은 인증되지 않은 사용자가 대시보드를 볼 수 있게 합니다. 공개 노출과 결합하면 운영 데이터가 유출됩니다."
      fix: "GF_AUTH_ANONYMOUS_ENABLED를 false로 설정하세요. 익명 조회가 의도적이고 인스턴스가 공개되지 않은 경우에만 예외로 허용하세요."
  npm:
    admin_public:
      title: "NPM 관리 인터페이스가 공개적으로 노출되어 있습니다"
      description: "%{service}가 Nginx Proxy Manager 관리 UI를 %{port}에 노출하고 있습니다."
      why: "공개적으로 접근 가능한 NPM 관리 인터페이스는 누구나 리버스 프록시, SSL 인증서, 접근 규칙을 관리할 수 있게 합니다."
      fix: "NPM을 localhost 또는 신뢰할 수 있는 네트워크로 제한하거나 VPN 뒤에 배치하세요. 기본 관리자 자격 증명을 즉시 변경하세요."
  caddy:
    admin_api_public:
      title: "Caddy 관리 API가 공개적으로 노출되어 있습니다"
      description: "%{service}가 CADDY_ADMIN을 %{admin}(으)로 설정하여 관리 API를 노출하고 있습니다."
      why: "Caddy 관리 API는 동적 재구성이 가능하며, 신뢰할 수 없는 클라이언트가 접근할 경우 민감한 사이트 데이터가 노출될 수 있습니다."
      fix: "CADDY_ADMIN을 제거하거나 localhost:2019로 설정하세요. 원격 관리가 필요한 경우 Unix 소켓을 사용하거나 방화벽 규칙과 강력한 인증으로 접근을 제한하세요."
  gitlab:
    root_password_env:
      title: "GitLab 루트 비밀번호가 환경 변수로 설정되어 있습니다"
      description: "%{service}가 GITLAB_ROOT_PASSWORD를 일반 환경 변수로 설정하고 있습니다."
      why: "루트 비밀번호를 환경 변수에 저장하면 프로세스 목록, 컨테이너 검사, Compose 파일을 통해 노출될 수 있습니다."
      fix: "비밀번호 파일이나 Docker Secrets를 사용하여 루트 비밀번호를 주입하세요."
    shared_runners_registration_token_env:
      title: "GitLab 공유 Runner 등록 토큰이 환경 변수로 노출되어 있습니다"
      description: "%{service}가 GITLAB_SHARED_RUNNERS_REGISTRATION_TOKEN을 일반 환경 변수로 설정하고 있습니다."
      why: "유출된 등록 토큰은 임의의 Runner가 GitLab 인스턴스에 등록하여 CI 작업을 가로챌 수 있게 합니다."
      fix: "등록 토큰에 비밀 파일이나 Docker Secrets를 사용하고, 노출 가능성이 있다면 토큰을 회전하세요."
    signups_enabled:
      title: "GitLab 공개 가입이 활성화되어 있습니다"
      description: "%{service}가 GITLAB_SIGNUP_ENABLED를 설정하여 누구나 계정을 생성할 수 있게 했습니다."
      why: "셀프 호스팅 GitLab 인스턴스에서 열린 가입은 남용, 스팸, 비공개 저장소에 대한 무단 접근으로 이어질 수 있습니다."
      fix: "가입을 비활성화하거나 승인된 도메인으로 제한하세요. 사용자 프로비저닝에는 외부 IdP를 사용하세요."
    insecure_external_url:
      title: "GitLab 외부 URL이 평문 HTTP를 사용합니다"
      description: "%{service}가 EXTERNAL_URL을 %{url}(으)로 설정하여 암호화되지 않은 HTTP를 사용합니다."
      why: "GitLab을 HTTP로 제공하면 인증 토큰, 쿠키, 저장소 데이터가 가로채기 및 변조에 노출됩니다."
      fix: "EXTERNAL_URL을 HTTPS URL로 설정하고, 리버스 프록시나 GitLab 내장 Lets Encrypt 연동을 통해 TLS를 종료하세요."
