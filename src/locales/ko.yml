        why: "보호되지 않은 Redis 인스턴스는 데이터 탈취, 캐시 변조, 악성 페이로드 공격 등에 악용될 수 있습니다."
        fix: "compose 파일의 command 지시어에 redis-server --requirepass를 통해 비밀번호를 설정하세요."
