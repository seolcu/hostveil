        why: "데이터베이스 포트를 인터넷에 노출하면 무차별 대입 공격과 직접적인 데이터 유출이 가능합니다."
        fix: "PostgreSQL 포트 5432를 localhost 또는 내부 Docker 네트워크로 바인딩하세요. 직접 접근 대신 애플리케이션 컨테이너를 통해 접근하세요."
