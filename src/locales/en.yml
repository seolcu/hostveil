finding:
  lynis:
    host_warnings:
      title: "Lynis reported host hardening warnings"
      description: "Lynis reported %{count} warning(s) for %{subject} with hardening index %{index}."
      why: "Lynis warnings usually point to host-level hardening gaps that expand the attack surface or weaken recovery after compromise."
      fix: "Review the reported Lynis warnings first, apply the highest-impact host hardening changes, and rerun the audit to confirm the result."
    host_suggestions:
      title: "Lynis reported additional hardening suggestions"
      description: "Lynis reported %{count} suggestion(s) for %{subject} with hardening index %{index}."
      why: "Even when they are not immediate break-fix items, accumulated hardening suggestions often reveal a weaker default host posture than intended."
      fix: "Work through the Lynis suggestions that fit this host's role and rerun the audit after each hardening pass."
  trivy:
    image_vulnerabilities:
      title: "Image has known vulnerabilities"
      description: "%{image} has %{count} vulnerability record(s) reported by Trivy."
      why: "Known vulnerabilities in base images or packages can be exploited when exposed services are reachable."
      fix: "Update the image to a patched version, rebuild if needed, and pin a stable tag or digest before the next deploy."
  dockle:
    image_best_practice:
      title: "Image failed Dockle best-practice checks"
      description: "%{image} triggered %{count} best-practice or hardening check(s) in Dockle."
      why: "Dockle findings often indicate image-layer hardening gaps that increase exploitability or weaken runtime isolation in self-hosted deployments."
      fix: "Review the Dockle checkpoint IDs, update the Dockerfile or base image accordingly, and rescan until high-impact findings are addressed."
  gitleaks:
    project_secret_leak:
      title: "Project files appear to contain leaked secrets"
      description: "Gitleaks reported %{count} potential secret leak(s) in %{path}."
      why: "Secrets left in project-adjacent scripts, backup files, or notes can expose live credentials outside the Compose configuration paths that hostveil already scans natively."
      fix: "Remove the plaintext secret material from the file, rotate any exposed credentials, and move long-lived secrets into a safer secret-management path before rescanning."
  updates:
    latest:
      title: "Image uses the latest tag"
      description: "%{service} uses %{image}, which tracks a moving target instead of a stable version."
      why: "A moving tag makes deployments harder to reproduce and can pull breaking changes without warning."
      fix: "Pin the image to a specific version or digest before the next deploy."
    no_tag:
      title: "Image is missing an explicit tag"
      description: "%{service} uses %{image} without an explicit tag."
      why: "Images without a tag implicitly resolve to latest-like behavior and make updates unpredictable."
      fix: "Add a stable, explicit tag such as a pinned release version."
    major_only:
      title: "Image is only pinned to a major version"
      description: "%{service} uses %{image}, which pins only the major version."
      why: "Major-only tags can still move to new minor or patch releases with behavior changes."
      fix: "Pin at least a minor or patch version for predictable rollouts."
  exposure:
    public_bind:
      title: "Service is published on a public interface"
      description: "%{service} publishes %{port} on a publicly reachable host interface."
      why: "Public bindings increase the attack surface and can bypass a safer localhost-only or reverse-proxy setup."
      fix: "Bind the port to 127.0.0.1 unless the service truly needs direct external access."
    admin_public:
      title: "Admin interface is exposed publicly"
      description: "%{service} exposes an administrative interface on %{port}."
      why: "Public admin panels are high-value targets for brute force, enumeration, and exploit attempts."
      fix: "Put the admin interface behind a private network or reverse proxy with authentication."
    reverse_proxy:
      title: "Service should sit behind a reverse proxy"
      description: "%{service} is directly published on %{port} even though it is usually safer behind a reverse proxy."
      why: "Directly publishing user-facing apps makes TLS, auth hardening, and access control easier to miss."
      fix: "Route the service through a reverse proxy and remove the direct public port where possible."
  permissions:
    privileged:
      title: "Container runs in privileged mode"
      description: "%{service} enables privileged mode."
      why: "Privileged containers get broad kernel and device access that sharply increases breakout impact."
      fix: "Drop privileged mode and grant only the minimal capabilities the service actually needs."
    root:
      title: "Container runs as root"
      description: "%{service} is configured to run as root."
      why: "A compromised root container has a larger blast radius and makes host escapes more dangerous."
      fix: "Configure the service to run as a non-root UID/GID where supported."
    implicit_root:
      title: "Container does not set a user"
      description: "%{service} does not set a user, so it likely runs as root by default."
      why: "Many images default to root, which grants more filesystem and process access than needed."
      fix: "Set an explicit non-root user in the compose file when the image supports it."
    host_network:
      title: "Container uses host networking"
      description: "%{service} uses network_mode: host."
      why: "Host networking removes network isolation and can expose more ports and traffic than intended."
      fix: "Use bridge networking unless the service has a strong, documented need for host mode."
    sensitive_mount:
      title: "Container mounts a sensitive host path"
      description: "%{service} mounts the sensitive host path %{path}."
      why: "Mounting sensitive host paths can expose secrets, host control sockets, or broad filesystem access to the container."
      fix: "Remove the mount or replace it with a narrower path that exposes only the required data."
  network:
    default_bridge_used:
      title: "Stack relies on the default bridge network"
      description: "The compose file does not define any custom networks, so all services share the default bridge."
      why: "The default bridge provides weak isolation between containers and lacks automatic DNS discovery, making service-to-service traffic harder to secure."
      fix: "Define explicit custom networks in the compose file and assign services to them."
    bridge_mode_public_ports:
      title: "Service uses bridge mode with public ports"
      description: "%{service} sets network_mode: bridge and publishes %{port} publicly."
      why: "Explicit bridge mode with public ports keeps the service on the default bridge while exposing it externally, reducing network-layer isolation benefits."
      fix: "Move the service to a custom network and bind the port to 127.0.0.1 unless direct external access is required."
    host_mode:
      title: "Service uses host network mode"
      description: "%{service} sets network_mode: host, sharing the host's network stack."
      why: "Host network mode removes all network isolation between the container and the host, allowing the container to bind to any host port and access the host's network interfaces directly."
      fix: "Use a custom bridge network with explicit port mappings instead of host network mode."
  sensitive:
    inline_secret:
      title: "Service hardcodes a secret in environment"
      description: "%{service} sets the sensitive variable %{variable} directly in environment."
      why: "Inline secrets are easy to leak through version control, backups, and process inspection."
      fix: "Move the secret to Docker secrets, an external secret manager, or a protected env file outside version control."
    default_credential:
      title: "Service uses a default or empty credential"
      description: "%{service} sets %{variable} to a default or empty credential."
      why: "Default credentials are widely known and are often the first thing attackers try."
      fix: "Set a unique secret value and keep it outside the compose file where possible."
    env_file_secret:
      title: "Referenced env file contains plaintext secrets"
      description: "%{service} references %{env_file}, which contains plaintext secret values."
      why: "Plaintext env files are frequently copied into backups, shells, and repositories without adequate protection."
      fix: "Move secrets to Docker secrets or ensure the env file is protected and excluded from version control."
  host:
    ssh_root_login:
      title: "SSH root login is enabled"
      description: "%{path} allows root login with PermitRootLogin %{value}."
      why: "Allowing direct root login gives attackers one high-value account to target and removes an extra privilege boundary after compromise."
      fix: "Edit %{path} and set 'PermitRootLogin no'. Run 'sshd -t' to validate syntax, then reload with 'systemctl reload sshd' (or 'service ssh reload'). Ensure you have another sudo-capable account before disconnecting."
    ssh_password_auth:
      title: "SSH password authentication is enabled"
      description: "%{path} enables PasswordAuthentication yes."
      why: "Password-based SSH login is easier to brute force, phish, or reuse across hosts than key-based authentication."
      fix: "First confirm you can log in with an SSH key. Then edit %{path}, set 'PasswordAuthentication no', run 'sshd -t', and reload the SSH service. Keep your current session open until you verify key-based access works."
    ssh_empty_passwords:
      title: "SSH allows empty passwords"
      description: "%{path} enables PermitEmptyPasswords yes."
      why: "Permitting empty passwords can expose the host to trivial compromise if any login-capable account is misconfigured."
      fix: "Edit %{path}, set 'PermitEmptyPasswords no', run 'sshd -t', and reload the SSH service. Review local user accounts with 'passwd -S' or 'chage -l' to ensure no blank passwords exist."
    ssh_pubkey_auth:
      title: "SSH public key authentication is disabled"
      description: "%{path} sets PubkeyAuthentication no."
      why: "Disabling public key authentication pushes administrators toward weaker password-based access or other less auditable workarounds."
      fix: "Edit %{path}, set 'PubkeyAuthentication yes', run 'sshd -t', and reload the SSH service. Enroll your key with 'ssh-copy-id' before disabling passwords to avoid lockout."
    ssh_user_environment:
      title: "SSH allows user-controlled environment files"
      description: "%{path} enables PermitUserEnvironment yes."
      why: "Allowing SSH users to inject environment variables can weaken restricted command setups and create unexpected execution paths after login."
      fix: "Edit %{path}, set 'PermitUserEnvironment no', run 'sshd -t', and reload the SSH service. If you rely on environment files for specific keys, use AuthorizedKeysCommand or ForceCommand instead."
    ssh_x11_forwarding:
      title: "SSH X11 forwarding is enabled"
      description: "%{path} enables X11Forwarding yes."
      why: "X11 forwarding widens SSH session attack surface and can leak display/session trust boundaries from client systems to remote hosts."
      fix: "Edit %{path}, set 'X11Forwarding no', run 'sshd -t', and reload the SSH service. If GUI access is required, consider a remote desktop solution or local X forwarding over a VPN instead."
    ssh_weak_kex:
      title: "SSH allows weak key-exchange algorithms"
      description: "%{path} includes weak KexAlgorithms: %{algorithms}."
      why: "Weak key-exchange algorithms such as diffie-hellman-group1-sha1 are vulnerable to Logjam-style attacks and downgrade attacks."
      fix: "Edit %{path} and remove weak algorithms from KexAlgorithms. Prefer curve25519-sha256, ecdh-sha2-nistp521, or diffie-hellman-group-exchange-sha256. Run 'sshd -t' and reload the service."
    ssh_weak_macs:
      title: "SSH allows weak MAC algorithms"
      description: "%{path} includes weak MACs: %{algorithms}."
      why: "Weak MAC algorithms such as hmac-md5 do not provide adequate integrity protection for modern SSH sessions."
      fix: "Edit %{path} and remove weak algorithms from MACs. Prefer hmac-sha2-512-etm@openssh.com or hmac-sha2-256-etm@openssh.com. Run 'sshd -t' and reload the service."
    ssh_weak_ciphers:
      title: "SSH allows weak ciphers"
      description: "%{path} includes weak Ciphers: %{algorithms}."
      why: "Weak ciphers such as arcfour and 3des-cbc are vulnerable to known cryptanalytic attacks and do not provide adequate confidentiality."
      fix: "Edit %{path} and remove weak algorithms from Ciphers. Prefer chacha20-poly1305@openssh.com or aes256-gcm@openssh.com. Run 'sshd -t' and reload the service."
    ssh_listen_all:
      title: "SSH listens on all network interfaces"
      description: "%{path} binds SSH to all interfaces (ListenAddress %{values})."
      description_default: "%{path} has no ListenAddress set, so SSH binds to all interfaces by default."
      why: "Exposing SSH on every interface increases attack surface, especially on hosts with public or untrusted network segments."
      fix: "Add 'ListenAddress 127.0.0.1' (or your management interface IP) to %{path}, run 'sshd -t', and reload the SSH service. If you need remote access, prefer a VPN or bounce host instead of exposing SSH to the public internet."
    docker_socket_world_writable:
      title: "Docker socket is world writable"
      description: "%{path} is writable by all local users with mode %{mode}."
      why: "Anyone who can write to the Docker socket can control containers and often gain root-equivalent access on the host."
      fix: "Run 'chmod 660 %{path}' and 'chown root:docker %{path}' (adjust the group to your admin group). Verify with 'ls -l %{path}'. Audit group membership with 'getent group docker' and remove untrusted users."
    docker_socket_world_readable:
      title: "Docker socket is world readable"
      description: "%{path} is readable by all local users with mode %{mode}."
      why: "Broad read access can leak sensitive runtime and image metadata and often indicates weak Docker socket access control."
      fix: "Run 'chmod 660 %{path}' and 'chown root:docker %{path}'. Verify with 'ls -l %{path}'. Ensure only intended administrators are in the docker group."
    docker_daemon_tcp_public:
      title: "Docker daemon exposes a TCP listener"
      description: "%{path} configures Docker to listen on a non-local TCP host."
      why: "A public or broadly reachable Docker API can allow remote container control and host compromise if not strongly protected."
      fix: "Remove the TCP host entry from %{path} and keep only 'unix:///var/run/docker.sock'. Restart Docker with 'systemctl restart docker'. If remote access is required, use SSH tunneling or a TLS-protected reverse proxy instead."
    docker_daemon_tcp_no_tlsverify:
      title: "Docker TCP listener lacks TLS client verification"
      description: "%{path} exposes a non-local TCP Docker host without tlsverify enabled."
      why: "A remotely reachable Docker API without strong client authentication can allow full container control and often leads directly to host compromise."
      fix: "Prefer the local Unix socket. If a TCP listener is unavoidable, set 'tlsverify': true, provide CA/client certs, and restrict access with firewall rules or a VPN. Restart Docker after editing %{path}."
    docker_daemon_iptables_disabled:
      title: "Docker disables iptables management"
      description: "%{path} sets iptables to false in daemon.json."
      why: "Disabling Docker's iptables integration can leave published ports and container networking exposed in ways the operator does not expect."
      fix: "Remove 'iptables': false from %{path} (or set it to true), then restart Docker with 'systemctl restart docker'. Ensure your host firewall (ufw/firewalld) rules do not conflict with Docker's NAT rules."
    docker_not_rootless:
      title: "Docker is not running in rootless mode"
      description: "The Docker daemon is running as root."
      why: "Rootless Docker reduces the attack surface by running the daemon as an unprivileged user. Running as root means a Docker daemon compromise can lead directly to full host root access."
      fix: "Consider migrating to Docker Rootless mode. See the official Docker documentation for rootless installation and migration steps. Note: this is a guided change, not an automatic fix."
    docker_userns_remap_missing:
      title: "Docker user namespace remapping is not configured"
      description: "%{path} does not set userns-remap."
      why: "Without user namespace remapping, container processes run with host UIDs, increasing the blast radius of a container breakout."
      fix: "Add 'userns-remap': 'default' to %{path}, create the dockremap user/subuid/subgid mappings, then restart Docker."
    docker_live_restore_disabled:
      title: "Docker live-restore is not enabled"
      description: "%{path} does not set live-restore to true."
      why: "Without live-restore, all containers stop when the Docker daemon restarts, causing unnecessary downtime and potential data loss."
      fix: "Add 'live-restore': true to %{path}, then restart Docker with 'systemctl restart docker'."
    docker_log_driver_missing:
      title: "Docker log driver is not explicitly configured"
      description: "%{path} does not set an explicit log-driver."
      why: "The default json-file log driver grows without bounds, which can exhaust disk space and make log analysis difficult."
      fix: "Add 'log-driver': 'json-file' and 'log-opts': { 'max-size': '10m', 'max-file': '3' } to %{path}, or use a centralized log driver like 'local'."
    docker_default_ulimits_missing:
      title: "Docker default ulimits are not configured"
      description: "%{path} does not set default-ulimits."
      why: "Without default ulimits, a single misbehaving container can exhaust host file descriptors or spawn excessive processes."
      fix: "Add 'default-ulimits': { 'nofile': { 'Name': 'nofile', 'Hard': 64000, 'Soft': 64000 } } to %{path}, then restart Docker."
    fail2ban_not_enabled:
      title: "Fail2ban is installed but not active"
      description: "%{path} shows local Fail2ban markers, but no enabled service marker was detected."
      why: "Installing Fail2ban without enabling the service or a real jail leaves repeated login abuse and noisy scanning unmitigated."
      fix: "Enable the service with 'systemctl enable --now fail2ban'. Configure a jail in /etc/fail2ban/jail.local (e.g., '[sshd] enabled = true'), then run 'fail2ban-client status' to confirm it is active and banning."
    defensive_controls_missing:
      title: "No intrusion-prevention control was detected"
      description: "%{path} does not show local markers for Fail2ban."
      why: "Basic blocking or ban automation can slow down repeated password attacks, scanning, and other noisy abuse against exposed services."
      fix: "Install Fail2ban with your package manager, enable the sshd jail, and start the service. If you use a cloud firewall or IDS, ensure it is actively dropping malicious traffic and review its block logs regularly."
    ufw_disabled:
      title: "UFW is installed but disabled"
      description: "%{path} shows UFW is present but ENABLED is set to no."
      why: "A host firewall helps narrow inbound exposure and makes it harder for accidentally published services to become reachable."
      fix: "Run 'ufw default deny incoming && ufw default allow outgoing'. Allow necessary ports (e.g., 'ufw allow 22/tcp') before enabling. Then run 'ufw enable' and verify with 'ufw status verbose'."
    ufw_default_input_policy_accept:
      title: "UFW default incoming policy is ACCEPT"
      description: "%{path} sets DEFAULT_INPUT_POLICY to %{policy}."
      why: "An ACCEPT default policy can leave newly exposed services reachable before explicit firewall rules are reviewed."
      fix: "Run 'ufw default deny incoming', then explicitly allow only required ports (e.g., 'ufw allow 22/tcp'). Verify with 'ufw status verbose' and test remote access before closing your session."
    unattended_upgrades_disabled:
      title: "Automatic security updates are disabled"
      description: "%{path} disables unattended-upgrades."
      why: "Missing security updates can leave known vulnerabilities unpatched longer than intended."
      fix: "Install unattended-upgrades and run 'dpkg-reconfigure -plow unattended-upgrades' to enable it. For non-Debian systems, configure an equivalent scheduled patching workflow and verify it runs with 'systemctl list-timers' or cron logs."
    package_lists_auto_update_disabled:
      title: "Automatic package list refresh is disabled"
      description: "%{path} disables APT::Periodic::Update-Package-Lists."
      why: "Outdated package indexes can delay security patch visibility and weaken automated patching expectations."
      fix: "Set APT::Periodic::Update-Package-Lists to 1 in /etc/apt/apt.conf.d/20auto-upgrades, or run 'dpkg-reconfigure -plow unattended-upgrades'. Verify with 'apt-config dump | grep Update-Package-Lists'."
    dnf_automatic_disabled:
      title: "dnf-automatic updates are disabled"
      description: "%{path} has apply_updates disabled under [commands]."
      why: "Without dnf-automatic, Fedora/RHEL/Rocky systems may miss security updates until manual intervention."
      fix: "Install dnf-automatic ('dnf install dnf-automatic'), set apply_updates = yes in %{path}, and enable the timer with 'systemctl enable --now dnf-automatic.timer'. Verify with 'systemctl list-timers | grep dnf-automatic'."
    dnf_automatic_timer_disabled:
      title: "dnf-automatic timer is not enabled"
      description: "%{path} exists but the dnf-automatic timer is not enabled."
      why: "Even with apply_updates configured, the timer must be active for scheduled updates to run."
      fix: "Enable the timer with 'systemctl enable --now dnf-automatic.timer'. Verify with 'systemctl status dnf-automatic.timer'."
    yum_cron_disabled:
      title: "yum-cron updates are disabled"
      description: "%{path} has apply_updates disabled under [commands]."
      why: "Without yum-cron, older RHEL systems may miss security updates until manual intervention."
      fix: "Install yum-cron, set apply_updates = yes in %{path}, and start the service with 'systemctl enable --now yum-cron'."
    yum_cron_service_disabled:
      title: "yum-cron service is not enabled"
      description: "%{path} exists but the yum-cron service is not enabled."
      why: "Even with apply_updates configured, the service must be active for scheduled updates to run."
      fix: "Enable the service with 'systemctl enable --now yum-cron'. Verify with 'systemctl status yum-cron'."
    kernel_aslr_disabled:
      title: "Kernel ASLR is disabled"
      description: "%{path} is set to 0, disabling address space layout randomization."
      why: "ASLR makes memory corruption exploits harder by randomizing process memory layouts. Disabling it significantly increases exploit reliability."
      fix: "Run 'sysctl -w kernel.randomize_va_space=2' to apply immediately. Create /etc/sysctl.d/99-aslr.conf with 'kernel.randomize_va_space = 2' to persist across reboots. Verify with 'sysctl kernel.randomize_va_space'."
    kernel_syn_cookies_disabled:
      title: "TCP SYN cookies are disabled"
      description: "%{path} is set to 0, disabling SYN flood protection."
      why: "Without SYN cookies, the host is more vulnerable to SYN flood denial-of-service attacks that can exhaust connection state tables."
      fix: "Run 'sysctl -w net.ipv4.tcp_syncookies=1' to apply immediately. Create /etc/sysctl.d/99-syn-cookies.conf with 'net.ipv4.tcp_syncookies = 1' to persist. Verify with 'sysctl net.ipv4.tcp_syncookies'."
    kernel_broadcast_ping_allowed:
      title: "Broadcast ICMP echo requests are allowed"
      description: "%{path} is set to 0, allowing broadcast ping responses."
      why: "Responding to broadcast pings can facilitate network reconnaissance and amplification-style scanning."
      fix: "Run 'sysctl -w net.ipv4.icmp_echo_ignore_broadcasts=1' to apply immediately. Create /etc/sysctl.d/99-icmp-broadcast.conf with 'net.ipv4.icmp_echo_ignore_broadcasts = 1' to persist. Verify with 'sysctl net.ipv4.icmp_echo_ignore_broadcasts'."
    kernel_ip_forward_enabled:
      title: "IP forwarding is enabled without Docker"
      description: "%{path} is set to 1 and no local Docker socket was detected."
      why: "IP forwarding turns the host into a router. When it is enabled without a clear need such as Docker or a known routing role, it can expose internal traffic paths."
      fix: "Run 'sysctl -w net.ipv4.ip_forward=0' to apply immediately. Create /etc/sysctl.d/99-ip-forward.conf with 'net.ipv4.ip_forward = 0' to persist. If this host is intentionally a router, document the exception and ensure routing is restricted by firewall rules."
    kernel_unprivileged_userns_clone_enabled:
      title: "Unprivileged user namespaces are enabled"
      description: "%{path} is set to 1, allowing unprivileged users to create new namespaces."
      why: "User namespaces expand the kernel attack surface for privilege-escalation exploits. On hosts without a container runtime, unprivileged namespace creation is usually unnecessary."
      fix: "Run 'sysctl -w kernel.unprivileged_userns_clone=0' to apply immediately. Create /etc/sysctl.d/99-userns.conf with 'kernel.unprivileged_userns_clone = 0' to persist. Verify with 'sysctl kernel.unprivileged_userns_clone'."
    kernel_max_user_namespaces_enabled:
      title: "User namespaces are not restricted"
      description: "%{path} is set to %{value}, allowing user namespace creation."
      why: "A positive max_user_namespaces limit allows unprivileged users to create namespaces. Restricting or disabling this reduces kernel attack surface on non-container hosts."
      fix: "Run 'sysctl -w user.max_user_namespaces=0' to disable user namespaces entirely, or set a small limit if specific unprivileged containers are required. Create /etc/sysctl.d/99-userns.conf to persist. Verify with 'sysctl user.max_user_namespaces'."
    kernel_modules_disabled_not_set:
      title: "Kernel module loading is not restricted"
      description: "%{path} is set to 0, allowing unrestricted kernel module loading."
      why: "Unrestricted module loading allows attackers with root or physical access to load arbitrary kernel code. Restricting it reduces the kernel attack surface and makes certain persistence techniques harder."
      fix: "Run 'sysctl -w kernel.modules_disabled=1' to prevent new module loading. Create /etc/sysctl.d/99-modules.conf with 'kernel.modules_disabled = 1' to persist. Note: ensure all required modules are loaded before setting this, as it cannot be undone without a reboot."
    kernel_module_signing_not_enforced:
      title: "Kernel module signing is not enforced"
      description: "%{path} is missing or set to N, allowing unsigned kernel modules to be loaded."
      why: "Without module signing enforcement, a compromised root account or attacker with physical access can load malicious kernel modules that bypass user-space security controls."
      fix: "Enable CONFIG_MODULE_SIG_FORCE in your kernel config and ensure the kernel command line includes 'module.sig_enforce=1'. On most distributions this requires rebuilding or installing a signed kernel package."
    secure_boot_disabled:
      title: "UEFI Secure Boot is disabled"
      description: "%{path} indicates Secure Boot is not enabled."
      why: "Secure Boot prevents unauthorized bootloaders and kernel images from loading. Without it, an attacker with physical access or a compromised bootloader can inject malicious code before the OS starts."
      fix: "Enable Secure Boot in your system's UEFI firmware settings. Ensure your OS bootloader and kernel are signed with a trusted key."
    grub_password_missing:
      title: "GRUB bootloader lacks password protection"
      description: "%{path} does not contain a GRUB password or unrestricted restriction."
      why: "Without a GRUB password, anyone with physical or console access can edit boot parameters to bypass security controls, drop to a root shell, or disable SELinux/AppArmor at boot."
      fix: "Set a GRUB password with 'grub-mkpasswd-pbkdf2', then add the hash to /etc/grub.d/40_custom and regenerate the config with 'update-grub' (Debian/Ubuntu) or 'grub2-mkconfig -o /boot/grub2/grub.cfg' (Fedora/RHEL)."
    shadow_permissions_weak:
      title: "/etc/shadow permissions are too permissive"
      description: "%{path} has mode %{mode}, which is more permissive than 0640."
      why: "/etc/shadow stores password hashes. If it is readable by non-root users, attackers can extract hashes for offline cracking."
      fix: "Run 'chmod 640 %{path}' and 'chown root:shadow %{path}' (or root:root on distributions without a shadow group). Verify with 'ls -l %{path}'."
    shadow_weak_hash:
      title: "/etc/shadow contains weak password hashes"
      description: "%{path} uses %{algorithm} for at least one account password hash."
      why: "Weak hash algorithms like MD5 or unsalted hashes can be cracked orders of magnitude faster than modern algorithms such as SHA-512 or yescrypt."
      fix: "Force password changes for affected accounts with 'passwd -e <username>'. Ensure PAM is configured to use a strong algorithm (e.g., SHA-512 or yescrypt). On Debian/Ubuntu, check /etc/pam.d/common-password; on RHEL/Fedora, check /etc/pam.d/password-auth and /etc/pam.d/system-auth."
    shadow_empty_password:
      title: "/etc/shadow contains empty password fields"
      description: "%{path} has at least one account with an empty password field."
      why: "An empty password field means the account can be logged into without any password, which is a trivial compromise vector."
      fix: "Lock the affected accounts with 'passwd -l <username>' or set strong passwords immediately. Review /etc/passwd for unnecessary login accounts and disable or remove them."
    tmp_not_tmpfs:
      title: "/tmp is not mounted as tmpfs"
      description: "/tmp is mounted on a persistent filesystem instead of tmpfs."
      why: "A persistent /tmp can allow attackers to leave malicious files across reboots and may leak temporary data to other users. A tmpfs-backed /tmp is cleaned on reboot and is harder to abuse for persistence."
      fix: "Add a tmpfs line to /etc/fstab: 'tmpfs /tmp tmpfs defaults,noexec,nosuid,nodev,size=1G 0 0'. Then run 'systemctl daemon-reexec' and 'mount -a'. Verify with 'findmnt /tmp'."
    tmp_tmpfs_flags_missing:
      title: "/tmp tmpfs is missing hardening flags"
      description: "The /tmp tmpfs mount is missing the following flags: %{flags}."
      why: "Mount flags like noexec, nosuid, and nodev on /tmp prevent attackers from executing payloads, escalating privileges via setuid binaries, or creating special device files in a world-writable directory."
      fix: "Add the missing flags to the /tmp line in /etc/fstab (e.g., 'tmpfs /tmp tmpfs defaults,noexec,nosuid,nodev,size=1G 0 0'). Remount with 'mount -o remount,noexec,nosuid,nodev /tmp'. Verify with 'findmnt /tmp'."
    selinux_permissive:
      title: "SELinux is in permissive mode"
      description: "%{path} sets SELINUX to permissive."
      why: "Permissive mode logs policy violations but does not enforce them, leaving the host with only discretionary access control protections."
      fix: "Edit /etc/selinux/config and set SELINUX=enforcing. Run 'setenforce 1' to switch immediately (if supported). Rebuild the policy with 'semodule -B' if needed, then reboot. Monitor /var/log/audit/audit.log for denials after the change."
    selinux_disabled:
      title: "SELinux is disabled"
      description: "%{path} sets SELINUX to disabled."
      why: "Disabling SELinux removes mandatory access control entirely, reducing the defense-in-depth available for system processes and containers."
      fix: "Edit /etc/selinux/config and set SELINUX=enforcing. Rebuild the policy with 'semodule -B', then reboot. Validate that critical services (SSH, Docker) still start correctly. If you see denials, review audit logs and adjust policies before enforcing in production."
    apparmor_complain_mode:
      title: "AppArmor profiles are in complain mode"
      description: "%{path} shows one or more profiles in complain mode."
      why: "Complain mode logs policy violations but does not block them, so a compromised service can still perform actions that a hardened profile would deny."
      fix: "Use 'aa-enforce /etc/apparmor.d/profile.name' to switch a tested profile to enforce mode. Monitor /var/log/syslog or journald for denials first. Transition profiles one at a time in a staging environment before applying to production."
    apparmor_profile_missing:
      title: "AppArmor profile for %{service} is missing"
      description: "%{path} does not contain an enforced profile for %{service}."
      why: "Running %{service} without an AppArmor profile removes a layer of mandatory access control, allowing a compromised process more freedom to access files and system calls."
      fix: "Install or enable an AppArmor profile for %{service}. On Debian/Ubuntu, check 'apparmor-profiles' or distribution-specific packages (e.g., 'apparmor-profile-docker'). Load with 'apparmor_parser /etc/apparmor.d/profile.name' and verify with 'aa-status'."
    mac_framework_missing:
      title: "No mandatory access control framework detected"
      description: "%{path} does not show SELinux or AppArmor installation markers."
      why: "Mandatory access control frameworks add a layer of defense-in-depth beyond traditional Unix permissions. Their absence means fewer constraints on compromised processes."
      fix: "Install AppArmor ( Debian/Ubuntu: 'apt install apparmor apparmor-profiles' ) or SELinux ( RHEL/Fedora: usually preinstalled; enable with 'setenforce 1' ). Ensure critical containers and services run under confined profiles after installation."
    mount_flags_missing:
      title: "Sensitive mount lacks hardening flags"
      description: "%{mount_point} is missing the following flags: %{flags}."
      why: "Mount flags like noexec, nosuid, and nodev restrict what can run or escalate privileges from a partition. Their absence on sensitive directories increases blast radius from compromise."
      fix: "Add the missing flags to /etc/fstab for %{mount_point} (e.g., 'defaults,noexec,nosuid,nodev'). Remount with 'mount -o remount,noexec,nosuid,nodev %{mount_point}'. Verify with 'findmnt %{mount_point}' or 'mount | grep %{mount_point}'. Ensure a backup boot medium is available before changing /boot."
    proc_hidepid_missing:
      title: "/proc is mounted without hidepid"
      description: "The /proc mount does not set a hidepid option."
      why: "Without hidepid, any local user can enumerate all running processes, gather command lines, and identify other users' activity. This leaks operational metadata and helps attackers map the system."
      fix: "Add 'hidepid=2' to the /proc line in /etc/fstab (e.g., 'proc /proc proc defaults,hidepid=2'). Remount with 'mount -o remount,hidepid=2 /proc'. Ensure monitoring or management tools that rely on full /proc access still function correctly."
    proc_hidepid_weak:
      title: "/proc hidepid is set to a weak value"
      description: "The /proc mount sets hidepid but not to a restrictive value."
      why: "hidepid=1 only hides process IDs from other users, while hidepid=2 additionally hides process metadata inside /proc/PID directories. A stronger setting reduces information leakage more effectively."
      fix: "Change the /proc mount option to 'hidepid=2' in /etc/fstab and remount with 'mount -o remount,hidepid=2 /proc'. Validate that monitoring and administration workflows still work before making the change permanent."
    systemd_hardening_missing:
      title: "Systemd service lacks hardening directives"
      description: "%{service} is missing the following hardening markers: %{flags}."
      why: "Systemd directives like NoNewPrivileges, ProtectSystem, ProtectHome, and PrivateTmp constrain service runtime and reduce blast radius if a service is compromised. Their absence leaves more host resources exposed."
      fix: "Edit %{service} and add the missing directives under [Service]. Start with NoNewPrivileges=true and PrivateTmp=true, then test. Add ProtectSystem=strict and ProtectHome=true after validating the service still starts and functions correctly. Run 'systemctl daemon-reload && systemctl restart %{service}' after editing."
    firewalld_installed_but_disabled:
      title: "Firewalld is installed but disabled"
      description: "Firewalld is present at %{path} but the service is not enabled."
      why: "A host firewall helps narrow inbound exposure. Installing firewalld without enabling it leaves the host with no active firewall policy."
      fix: "Enable firewalld with 'systemctl enable --now firewalld'. Configure necessary zones and services (e.g., 'firewall-cmd --permanent --add-service=ssh'), then reload with 'firewall-cmd --reload'. Verify with 'firewall-cmd --state'."
    firewalld_default_zone_trusted:
      title: "Firewalld default zone is trusted"
      description: "%{path} sets DefaultZone to %{zone}."
      why: "The trusted zone allows all traffic by default, which effectively disables firewall protection for incoming connections."
      fix: "Change the default zone to 'public' or a more restrictive custom zone in %{path}, then run 'firewall-cmd --set-default-zone=public' and 'firewall-cmd --reload'. Review allowed services with 'firewall-cmd --list-services'."
    nftables_installed_no_rules:
      title: "nftables is installed but has no rules"
      description: "nftables configuration at %{path} is empty."
      why: "An empty nftables ruleset means no packet filtering is active, leaving the host exposed to unwanted traffic."
      fix: "Define a basic nftables ruleset in %{path} (e.g., drop incoming traffic by default and allow established/related connections and necessary ports). Load it with 'nft -f %{path}' and enable the nftables service with 'systemctl enable --now nftables'."
    no_firewall_detected:
      title: "No host firewall was detected"
      description: "No UFW, firewalld, or nftables installation markers were found."
      why: "Without a host firewall, any service that accidentally binds to a public interface or port becomes immediately reachable, and lateral movement is harder to contain."
      fix: "Install and enable a host firewall. On Debian/Ubuntu, use UFW ('apt install ufw'). On Fedora/RHEL/Rocky, use firewalld ('dnf install firewalld'). For advanced setups, configure nftables directly. Allow only necessary ports before enabling."
    fim_missing:
      title: "No file integrity monitoring tool detected"
      description: "No AIDE, Tripwire, Samhain, or OSSEC installation markers were found."
      why: "Without file integrity monitoring, unauthorized changes to critical system files may go unnoticed after a compromise, delaying detection and incident response."
      fix: "Install AIDE ('apt install aide' or 'dnf install aide') or Tripwire, initialize the database, and schedule regular checks via cron or systemd timer."
    aide_not_initialized:
      title: "AIDE is installed but not initialized"
      description: "AIDE installation markers were found, but no AIDE database exists."
      why: "An uninitialized AIDE installation cannot detect file changes because there is no baseline database to compare against."
      fix: "Run 'aideinit' (Debian/Ubuntu) or 'aide --init' (Fedora/RHEL) to create the baseline database, then schedule 'aide --check' via cron or systemd timer."
    tripwire_not_initialized:
      title: "Tripwire is installed but not initialized"
      description: "Tripwire installation markers were found, but no Tripwire database exists."
      why: "An uninitialized Tripwire installation cannot detect file changes because the policy database has not been created."
      fix: "Run 'tripwire --init' to create the database after configuring the policy file, then schedule periodic integrity checks."
  runtime:
    seccomp_unconfined:
      title: "Container disables seccomp"
      description: "%{service} sets seccomp to unconfined, removing syscall filtering."
      why: "Disabling seccomp removes a critical layer of runtime sandboxing, allowing the container to use any syscall and increasing the impact of a container breakout."
      fix: "Remove seccomp:unconfined from security_opt. If the service needs specific syscalls, create a custom seccomp profile that allows only those syscalls instead of disabling filtering entirely."
    seccomp_missing:
      title: "Container does not use a custom seccomp profile"
      description: "%{service} does not set an explicit seccomp profile."
      why: "The default Docker seccomp profile blocks dangerous syscalls, but explicitly declaring a profile makes the security posture intentional and easier to audit."
      fix: "Add an explicit seccomp profile to security_opt, or at least document that the default profile is acceptable for this service."
    dangerous_capabilities:
      title: "Container adds dangerous Linux capabilities"
      description: "%{service} adds the following high-risk capabilities: %{capabilities}."
      why: "Capabilities like NET_ADMIN, SYS_ADMIN, SYS_PTRACE, SYS_MODULE, and DAC_READ_SEARCH significantly expand what a compromised container can do on the host, often approaching privileged-mode risk."
      fix: "Remove unnecessary capabilities from cap_add. If the service genuinely needs them, document the justification and restrict the container in other ways (AppArmor/SELinux, read-only rootfs, drop-all-then-add)."
    no_new_privileges_disabled:
      title: "Container allows privilege escalation"
      description: "%{service} does not set no-new-privileges:true in security_opt."
      why: "Without no-new-privileges, processes inside the container can gain additional capabilities through setuid binaries or file capabilities, increasing the blast radius of a compromise."
      fix: "Add 'no-new-privileges:true' to security_opt in the compose file for this service."
  vaultwarden:
    signups_enabled:
      title: "Vaultwarden signups are left enabled"
      description: "%{service} sets SIGNUPS_ALLOWED=true."
      why: "Leaving open registration enabled after initial setup makes it easier for unwanted accounts to be created and expands the public attack surface of a password manager service."
      fix: "Disable signups after the initial onboarding window or gate account creation through an invite-only workflow."
    admin_surface_public:
      title: "Vaultwarden admin surface is reachable from a public bind"
      description: "%{service} enables the admin token while the service is also published on a public interface."
      why: "A publicly reachable Vaultwarden deployment with the admin page enabled exposes a high-value management surface to probing, brute force, and credential leakage risks."
      fix: "Keep Vaultwarden behind a reverse proxy or localhost-only bind and avoid exposing the admin page to the public internet."
    insecure_domain:
      title: "Vaultwarden domain is configured for public HTTP"
      description: "%{service} sets DOMAIN to %{domain}, which is not an HTTPS base URL."
      why: "Vaultwarden expects a secure context for important web features, and using a public HTTP base URL weakens transport security for a password manager deployment."
      fix: "Terminate TLS at a reverse proxy and set DOMAIN to the external HTTPS base URL."
  jellyfin:
    insecure_published_url:
      title: "Jellyfin published URL uses public HTTP"
      description: "%{service} sets JELLYFIN_PublishedServerUrl to %{url}, which is not an HTTPS URL."
      why: "Publishing a media service with an HTTP external URL weakens transport security and makes it easier to expose clients to insecure or mixed-content access paths."
      fix: "Expose Jellyfin through HTTPS and set JELLYFIN_PublishedServerUrl to the external HTTPS URL seen by clients."
    discovery_public:
      title: "Jellyfin autodiscovery port is publicly reachable"
      description: "%{service} publishes the autodiscovery port on %{port}."
      why: "A publicly reachable autodiscovery port increases the visibility of the media server and is often unnecessary outside a trusted local network."
      fix: "Limit the autodiscovery port to a local network, bind it narrowly, or disable the public publish when discovery is not needed."
    media_mount_writable:
      title: "Jellyfin media library is mounted writable"
      description: "%{service} mounts %{path} without read-only protection."
      why: "Granting write access to media libraries increases the impact of a compromise and makes accidental or malicious file modification easier."
      fix: "Mount media libraries read-only unless Jellyfin truly needs write access for that path."
  gitea:
    web_and_ssh_public:
      title: "Gitea publishes both web and SSH surfaces publicly"
      description: "%{service} exposes both the web UI and the Git-over-SSH endpoint directly on public interfaces."
      why: "Publishing both user-facing surfaces directly broadens the attack surface and makes it easier to miss proxy, auth, and rate-limiting protections."
      fix: "Prefer a reverse proxy or narrow binds for the web UI, and expose SSH only when it is intentionally required."
    ssh_published_public:
      title: "Gitea SSH endpoint is publicly reachable"
      description: "%{service} publishes the Git-over-SSH port on %{port}."
      why: "A public SSH endpoint is a separate attack surface that can attract brute force and enumeration even if the web UI is otherwise hardened."
      fix: "Limit SSH exposure to the intended network, use key-based auth, and avoid publishing it publicly when HTTPS clone/push is sufficient."
    inline_security_secrets:
      title: "Gitea app secrets are hardcoded in Compose"
      description: "%{service} sets %{variables} directly in environment."
      why: "Inlining Gitea security tokens in Compose makes them easier to leak through repositories, backups, and process inspection, and misses the documented __FILE-based secret path."
      fix: "Move Gitea security secrets to files or a secrets backend and prefer the documented __FILE configuration path for sensitive values."
  immich:
    shared_secret_env_file:
      title: "Immich shares one secret env file across multiple services"
      description: "%{service} is part of an Immich stack where %{env_file} is reused across multiple services and contains secret values."
      why: "Sharing one plaintext env file across the server and machine-learning services increases blast radius if that file is copied, leaked, or mounted too broadly."
      fix: "Split sensitive values by service where practical and move high-value secrets such as database credentials to a safer secret delivery path."
    default_db_password:
      title: "Immich stack keeps the default database password"
      description: "%{service} is part of an Immich deployment that still uses the default DB_PASSWORD value."
      why: "Leaving the default database password in place makes the storage backend easier to compromise if the stack or env file is exposed."
      fix: "Replace the default DB password with a unique random value before deploying or exposing the stack."
  nextcloud:
    insecure_overwriteprotocol:
      title: "Nextcloud overwrite protocol is configured as HTTP"
      description: "%{service} sets OVERWRITEPROTOCOL=%{protocol} while the service is publicly reachable."
      why: "A public Nextcloud deployment with HTTP overwrite protocol weakens transport guarantees and can expose login or session traffic through insecure paths."
      fix: "Set OVERWRITEPROTOCOL to https and terminate TLS at the reverse proxy or edge before exposing the service."
    wildcard_trusted_domains:
      title: "Nextcloud trusted domains allow wildcard-style host matching"
      description: "%{service} sets NEXTCLOUD_TRUSTED_DOMAINS to %{trusted_domains}, which includes wildcard-style entries."
      why: "Overly broad trusted domain matching makes host-header abuse easier and increases the chance of serving requests for unintended hostnames."
      fix: "List only exact hostnames you control in NEXTCLOUD_TRUSTED_DOMAINS and remove wildcard-style values such as * or *.example.com."
    default_admin_credentials:
      title: "Nextcloud uses default admin bootstrap credentials"
      description: "%{service} keeps NEXTCLOUD_ADMIN_USER and NEXTCLOUD_ADMIN_PASSWORD at default-like values."
      why: "Default bootstrap credentials are widely known and can be abused quickly if setup endpoints are reachable before hardening is complete."
      fix: "Use a unique admin username and strong random admin password during bootstrap, then rotate secrets through a safer external secret path."
  traefik:
    insecure_api_enabled:
      title: "Traefik insecure API is enabled"
      description: "%{service} sets TRAEFIK_API_INSECURE=true, exposing the API and dashboard without TLS or authentication."
      why: "The insecure API removes transport and authentication protections from the Traefik dashboard and API, making them trivial to discover and abuse."
      fix: "Disable TRAEFIK_API_INSECURE. Access the dashboard through a secure entrypoint with TLS and basic-auth or IP whitelist middleware."
    dashboard_public:
      title: "Traefik dashboard is enabled on a public bind"
      description: "%{service} enables the dashboard while also publishing ports on a public interface."
      why: "A publicly reachable Traefik dashboard exposes routing configuration, health state, and metrics that aid reconnaissance and targeted attacks."
      fix: "Restrict the dashboard to localhost or a management network, or protect it with authentication and TLS through a secure entrypoint."
  portainer:
    admin_ui_public:
      title: "Portainer admin UI is publicly exposed"
      description: "%{service} exposes the Portainer management interface on %{port}."
      why: "A publicly reachable Portainer UI is a high-value target because it offers full container and host management capabilities to anyone who can authenticate or exploit it."
      fix: "Restrict Portainer to localhost, a management VPN, or a reverse proxy with strong authentication. Avoid publishing the admin port directly to the internet."
    docker_socket_mounted:
      title: "Portainer mounts the Docker socket"
      description: "%{service} binds the host Docker socket into the container."
      why: "A container with access to the Docker socket can create, modify, or delete containers and often escalate to root-equivalent host access."
      fix: "Review whether the Docker socket mount is required. If using Portainer Agent, consider removing the direct socket mount from the Portainer CE/EE container."
    auth_disabled:
      title: "Portainer authentication is disabled"
      description: "%{service} is started with --no-auth, disabling built-in authentication."
      why: "Running Portainer without authentication allows anyone who can reach the UI to manage containers, images, and host resources without any credentials."
      fix: "Remove --no-auth and enforce built-in authentication, or front Portainer with an external identity provider through a reverse proxy."
  homeassistant:
    ui_public:
      title: "Home Assistant UI is publicly exposed"
      description: "%{service} exposes the Home Assistant web interface on %{port}."
      why: "A publicly reachable Home Assistant instance increases attack surface and can expose smart home controls, camera feeds, and automation logic."
      fix: "Restrict Home Assistant to localhost or a reverse proxy with strong authentication, and avoid publishing port 8123 directly to the internet."
    host_network:
      title: "Home Assistant uses host networking"
      description: "%{service} sets network_mode to host."
      why: "Host networking removes network isolation and can expose more ports and multicast traffic than intended, especially for discovery protocols."
      fix: "Use bridge networking unless Home Assistant has a documented need for host mode, and disable unnecessary discovery integrations."
    device_mount:
      title: "Home Assistant mounts a host device"
      description: "%{service} mounts the host device %{path} into the container."
      why: "Device mounts can expose serial ports, USB radios, and Bluetooth adapters to the container, increasing the impact of a compromise."
      fix: "Review whether the device mount is required. Remove unnecessary device mounts and restrict access to the minimum required hardware."
  pihole:
    admin_public:
      title: "Pi-hole admin interface is publicly exposed"
      description: "%{service} exposes the Pi-hole web admin on %{port}."
      why: "A publicly reachable Pi-hole admin interface allows anyone to inspect blocklists, query logs, and change DNS configuration."
      fix: "Restrict the Pi-hole admin interface to localhost or a trusted network, or place it behind a reverse proxy with authentication."
    weak_password:
      title: "Pi-hole uses a weak web password"
      description: "%{service} sets WEBPASSWORD to a weak or default value."
      why: "A weak or default Pi-hole admin password makes it easier for attackers to gain administrative control of DNS filtering and inspect network query history."
      fix: "Set a strong, unique WEBPASSWORD in the compose file or an external secret, and rotate it regularly."
    no_password:
      title: "Pi-hole has no web password configured"
      description: "%{service} does not set WEBPASSWORD, leaving the admin interface unprotected."
      why: "Without a web password, anyone who can reach the Pi-hole admin interface can change DNS settings, disable blocking, and view query logs."
      fix: "Set a strong WEBPASSWORD environment variable or use an external secret to protect the Pi-hole admin interface."
    dns_public:
      title: "Pi-hole DNS is exposed on a public interface"
      description: "%{service} publishes the DNS port on %{port} to a public interface."
      why: "Exposing DNS to the public internet can turn the host into an open resolver, enabling DNS amplification attacks and unauthorized use."
      fix: "Bind DNS port 53 to a LAN IP or localhost unless you intentionally run a public DNS resolver with rate limiting and logging."
  grafana:
    admin_public:
      title: "Grafana admin interface is publicly exposed"
      description: "%{service} exposes the Grafana admin UI on %{port}."
      why: "A publicly reachable Grafana admin interface allows anyone to access monitoring dashboards and administrative settings."
      fix: "Restrict Grafana to localhost or a trusted network, or place it behind a reverse proxy with authentication."
    auth_disabled:
      title: "Grafana authentication is disabled"
      description: "%{service} disables the login form via GF_AUTH_DISABLE_LOGIN_FORM."
      why: "Disabling Grafana authentication removes all access control, allowing anyone to view and modify dashboards and data sources."
      fix: "Remove GF_AUTH_DISABLE_LOGIN_FORM or set it to false, and ensure GF_SECURITY_ADMIN_PASSWORD is set to a strong password."
    anonymous_access:
      title: "Grafana anonymous access is enabled"
      description: "%{service} enables anonymous access via GF_AUTH_ANONYMOUS_ENABLED."
      why: "Anonymous access allows unauthenticated users to view dashboards. Combined with public exposure, this leaks operational data."
      fix: "Set GF_AUTH_ANONYMOUS_ENABLED to false unless anonymous viewing is intentional and the instance is not publicly exposed."
  npm:
    admin_public:
      title: "NPM admin interface is publicly exposed"
      description: "%{service} exposes the Nginx Proxy Manager admin UI on %{port}."
      why: "A publicly reachable NPM admin interface allows anyone to manage reverse proxies, SSL certificates, and access rules."
      fix: "Restrict NPM to localhost or a trusted network, or place it behind a VPN. Change the default admin credentials immediately."
  caddy:
    admin_api_public:
      title: "Caddy admin API is publicly exposed"
      description: "%{service} sets CADDY_ADMIN to %{admin}, exposing the admin API."
      why: "The Caddy admin API allows dynamic reconfiguration and can expose sensitive site data if reachable by untrusted clients."
      fix: "Remove CADDY_ADMIN or set it to localhost:2019. If remote admin is required, use a Unix socket or restrict access with firewall rules and strong authentication."
  gitlab:
    root_password_env:
      title: "GitLab root password is set via environment variable"
      description: "%{service} sets GITLAB_ROOT_PASSWORD as a plain environment variable."
      why: "Storing the root password in environment variables leaves it visible in process listings, container inspection, and compose files."
      fix: "Use a secret file or Docker secrets to inject the root password instead of a plain environment variable."
    shared_runners_registration_token_env:
      title: "GitLab shared runner registration token is exposed via environment variable"
      description: "%{service} sets GITLAB_SHARED_RUNNERS_REGISTRATION_TOKEN as a plain environment variable."
      why: "A leaked registration token allows arbitrary runners to register with your GitLab instance and potentially intercept CI jobs."
      fix: "Use a secret file or Docker secrets for the registration token, and rotate the token if it may have been exposed."
    signups_enabled:
      title: "GitLab public sign-ups are enabled"
      description: "%{service} sets GITLAB_SIGNUP_ENABLED, allowing anyone to create an account."
      why: "Open registration on a self-hosted GitLab instance can lead to abuse, spam, and unauthorized access to private repositories."
      fix: "Disable sign-ups or restrict them to approved domains. Use an external identity provider for user provisioning."
    insecure_external_url:
      title: "GitLab external URL uses plain HTTP"
      description: "%{service} sets EXTERNAL_URL to %{url}, which uses unencrypted HTTP."
      why: "Serving GitLab over HTTP exposes authentication tokens, cookies, and repository data to interception and tampering."
      fix: "Set EXTERNAL_URL to an HTTPS URL and terminate TLS with a reverse proxy or GitLab's built-in Lets Encrypt integration."
  uptime_kuma:
    auth_disabled:
      title: "Uptime Kuma authentication is disabled"
      description: "%{service} sets UPTIME_KUMA_DISABLE_AUTH, allowing unauthenticated access."
      why: "Disabling authentication lets anyone view monitors, add or remove checks, and access notification settings."
      fix: "Remove UPTIME_KUMA_DISABLE_AUTH and configure username/password authentication through the Uptime Kuma UI."
    admin_public:
      title: "Uptime Kuma admin interface is publicly exposed"
      description: "%{service} exposes the Uptime Kuma dashboard on %{port}."
      why: "A publicly reachable Uptime Kuma dashboard reveals internal infrastructure topology, endpoints, and health status to attackers."
      fix: "Restrict Uptime Kuma to localhost or a trusted network, or place it behind a reverse proxy with strong authentication."
  duplicati:
    hardcoded_webpassword:
      title: "Duplicati web UI password is hardcoded in environment"
      description: "%{service} sets WEBPASSWORD as a plain environment variable."
      why: "A hardcoded web UI password is visible in the compose file, process listings, and container inspection, making it easier to leak."
      fix: "Move WEBPASSWORD to a Docker secret or an external secret manager and reference it securely."
    hardcoded_backup_credential:
      title: "Duplicati backup credential is hardcoded in environment"
      description: "%{service} sets %{variable} as a plain environment variable."
      why: "Hardcoding cloud backup credentials in environment variables exposes them to anyone who can inspect the container or the compose file."
      fix: "Move backup credentials to a Docker secret, a credential helper, or an external secret manager."
  restic:
    hardcoded_password:
      title: "Restic repository password is hardcoded in environment"
      description: "%{service} sets RESTIC_PASSWORD as a plain environment variable."
      why: "A hardcoded Restic password is visible in the compose file and container inspection. Anyone with access can decrypt backups."
      fix: "Move RESTIC_PASSWORD to a Docker secret or an external secret manager and reference it securely."
  borg:
    hardcoded_passphrase:
      title: "Borg repository passphrase is hardcoded in environment"
      description: "%{service} sets BORG_PASSPHRASE as a plain environment variable."
      why: "A hardcoded Borg passphrase is visible in the compose file and container inspection. Anyone with access can decrypt backups."
      fix: "Move BORG_PASSPHRASE to a Docker secret or an external secret manager and reference it securely."
  kopia:
    hardcoded_password:
      title: "Kopia repository password is hardcoded in environment"
