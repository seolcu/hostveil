    review_redis_password: "%{service}: externalize REDIS_PASSWORD using the chosen secret"
    review_pihole_password: "%{service}: externalize WEBPASSWORD using the chosen secret"
    status:
      no_compose_target: "No Compose target available for fixes."
      no_finding_selected: "Select a finding first to apply a fix."
      no_service_fix: "Selected finding has no Compose-level fix."
      no_fix_available: "Selected finding requires manual remediation."
    safe_mount_readonly: "%{service}: mount sensitive path %{path} as read-only"
    safe_postgres_password: "%{service}: add POSTGRES_PASSWORD with placeholder"
    safe_postgres_auth: "%{service}: set POSTGRES_HOST_AUTH_METHOD to scram-sha-256"
    safe_mysql_password: "%{service}: add MYSQL_ROOT_PASSWORD with placeholder"
    safe_redis_password: "%{service}: add REDIS_PASSWORD with placeholder"
    safe_redis_protected_mode: "%{service}: set REDIS_PROTECTED_MODE to yes"
    safe_grafana_auth: "%{service}: enable Grafana basic auth and disable anonymous access"
    safe_grafana_anonymous: "%{service}: disable Grafana anonymous access"
    safe_authentik_debug: "%{service}: set AUTHENTIK_DEBUG to false"
    safe_paperless_force_login: "%{service}: set PAPERLESS_FORCE_LOGIN to true"
    safe_pihole_password: "%{service}: set WEBPASSWORD with placeholder"
    safe_seccomp_default: "%{service}: remove seccomp:unconfined and use the default profile"
    safe_cap_drop_dangerous: "%{service}: remove dangerous capabilities from cap_add"
axis:
