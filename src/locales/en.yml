    text: |
      hostveil

      Usage:
        hostveil
        hostveil --json
        hostveil [--compose PATH] [--host-root PATH] [--adapters LIST] [--json]
        hostveil setup [--tool NAME]... [--tools LIST] [--yes]
        hostveil --auto-fix PATH [--preview-changes] [--yes]
        hostveil --fix PATH [--preview-changes] [--yes]
        hostveil upgrade [--version TAG]
        hostveil uninstall
        hostveil auto-upgrade enable
        hostveil auto-upgrade disable
        hostveil --version
        hostveil --help

      Lifecycle:
        First install:
          curl -fsSL https://raw.githubusercontent.com/seolcu/hostveil/main/scripts/install.sh | bash
        After install:
          hostveil setup
          hostveil upgrade
          hostveil uninstall
          hostveil auto-upgrade enable|disable
        Note:
          lifecycle commands are handled by the installed hostveil wrapper.
          direct development binaries (for example target/debug/hostveil) show guidance instead.

      Options:
        --compose PATH    override live discovery with a specific Compose file or directory
        --host-root PATH  override the default live host root (/) with a Linux root or snapshot
        --adapters LIST   choose optional scanners: all, none, or comma-separated trivy,dockle,lynis,gitleaks
        --tool NAME       select a setup tool explicitly for hostveil setup (repeatable)
        --tools LIST      comma-separated setup tool list for unattended setup runs
        --auto-fix PATH   preview or apply automatic Compose-only fixes for a specific file or directory
        --fix PATH        preview or apply automatic and review-required Compose fixes for a specific file or directory
        --preview-changes show the planned diff without writing any files
        --yes             apply the reviewed changes without an interactive confirmation prompt
        --locale LANG     use an explicit locale for this run (supported: en, ko)
        --json            emit scan result JSON instead of launching the TUI
        -V, --version     show version information
        -h, --help        show this help message

      Environment:
        HOSTVEIL_ADAPTERS provides the same adapter selection when --adapters is not set.
