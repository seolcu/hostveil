finding:
  trivy:
    image_vulnerabilities:
      title: "Image has known vulnerabilities"
      description: "%{image} has %{count} vulnerability record(s) reported by Trivy."
      why: "Known vulnerabilities in base images or packages can be exploited when exposed services are reachable."
      fix: "Update the image to a patched version, rebuild if needed, and pin a stable tag or digest before the next deploy."
  updates:
    latest:
      title: "Image uses the latest tag"
      description: "%{service} uses %{image}, which tracks a moving target instead of a stable version."
      why: "A moving tag makes deployments harder to reproduce and can pull breaking changes without warning."
      fix: "Pin the image to a specific version or digest before the next deploy."
    no_tag:
      title: "Image is missing an explicit tag"
      description: "%{service} uses %{image} without an explicit tag."
      why: "Images without a tag implicitly resolve to latest-like behavior and make updates unpredictable."
      fix: "Add a stable, explicit tag such as a pinned release version."
    major_only:
      title: "Image is only pinned to a major version"
      description: "%{service} uses %{image}, which pins only the major version."
      why: "Major-only tags can still move to new minor or patch releases with behavior changes."
      fix: "Pin at least a minor or patch version for predictable rollouts."
  exposure:
    public_bind:
      title: "Service is published on a public interface"
      description: "%{service} publishes %{port} on a publicly reachable host interface."
      why: "Public bindings increase the attack surface and can bypass a safer localhost-only or reverse-proxy setup."
      fix: "Bind the port to 127.0.0.1 unless the service truly needs direct external access."
    admin_public:
      title: "Admin interface is exposed publicly"
      description: "%{service} exposes an administrative interface on %{port}."
      why: "Public admin panels are high-value targets for brute force, enumeration, and exploit attempts."
      fix: "Put the admin interface behind a private network or reverse proxy with authentication."
    reverse_proxy:
      title: "Service should sit behind a reverse proxy"
      description: "%{service} is directly published on %{port} even though it is usually safer behind a reverse proxy."
      why: "Directly publishing user-facing apps makes TLS, auth hardening, and access control easier to miss."
      fix: "Route the service through a reverse proxy and remove the direct public port where possible."
  permissions:
    privileged:
      title: "Container runs in privileged mode"
      description: "%{service} enables privileged mode."
      why: "Privileged containers get broad kernel and device access that sharply increases breakout impact."
      fix: "Drop privileged mode and grant only the minimal capabilities the service actually needs."
    root:
      title: "Container runs as root"
      description: "%{service} is configured to run as root."
      why: "A compromised root container has a larger blast radius and makes host escapes more dangerous."
      fix: "Configure the service to run as a non-root UID/GID where supported."
    implicit_root:
      title: "Container does not set a user"
      description: "%{service} does not set a user, so it likely runs as root by default."
      why: "Many images default to root, which grants more filesystem and process access than needed."
      fix: "Set an explicit non-root user in the compose file when the image supports it."
    host_network:
      title: "Container uses host networking"
      description: "%{service} uses network_mode: host."
      why: "Host networking removes network isolation and can expose more ports and traffic than intended."
      fix: "Use bridge networking unless the service has a strong, documented need for host mode."
    sensitive_mount:
      title: "Container mounts a sensitive host path"
      description: "%{service} mounts the sensitive host path %{path}."
      why: "Mounting sensitive host paths can expose secrets, host control sockets, or broad filesystem access to the container."
      fix: "Remove the mount or replace it with a narrower path that exposes only the required data."
  sensitive:
    inline_secret:
      title: "Service hardcodes a secret in environment"
      description: "%{service} sets the sensitive variable %{variable} directly in environment."
      why: "Inline secrets are easy to leak through version control, backups, and process inspection."
      fix: "Move the secret to Docker secrets, an external secret manager, or a protected env file outside version control."
    default_credential:
      title: "Service uses a default or empty credential"
      description: "%{service} sets %{variable} to a default or empty credential."
      why: "Default credentials are widely known and are often the first thing attackers try."
      fix: "Set a unique secret value and keep it outside the compose file where possible."
    env_file_secret:
      title: "Referenced env file contains plaintext secrets"
      description: "%{service} references %{env_file}, which contains plaintext secret values."
      why: "Plaintext env files are frequently copied into backups, shells, and repositories without adequate protection."
      fix: "Move secrets to Docker secrets or ensure the env file is protected and excluded from version control."
  host:
    ssh_root_login:
      title: "SSH root login is enabled"
      description: "%{path} allows root login with PermitRootLogin %{value}."
      why: "Allowing direct root login gives attackers one high-value account to target and removes an extra privilege boundary after compromise."
      fix: "Set PermitRootLogin no and use a non-root account with sudo for administrative access."
    ssh_password_auth:
      title: "SSH password authentication is enabled"
      description: "%{path} enables PasswordAuthentication yes."
      why: "Password-based SSH login is easier to brute force, phish, or reuse across hosts than key-based authentication."
      fix: "Disable PasswordAuthentication after verifying that administrators can log in with SSH keys."
    ssh_empty_passwords:
      title: "SSH allows empty passwords"
      description: "%{path} enables PermitEmptyPasswords yes."
      why: "Permitting empty passwords can expose the host to trivial compromise if any login-capable account is misconfigured."
      fix: "Set PermitEmptyPasswords no and review local user accounts for weak or missing credentials."
    ssh_pubkey_auth:
      title: "SSH public key authentication is disabled"
      description: "%{path} sets PubkeyAuthentication no."
      why: "Disabling public key authentication pushes administrators toward weaker password-based access or other less auditable workarounds."
      fix: "Set PubkeyAuthentication yes and enroll administrator keys before disabling password-based SSH login."
    docker_socket_world_writable:
      title: "Docker socket is world writable"
      description: "%{path} is writable by all local users with mode %{mode}."
      why: "Anyone who can write to the Docker socket can control containers and often gain root-equivalent access on the host."
      fix: "Restrict the socket to root and the intended admin group, then audit which users belong to that group."
    docker_socket_world_readable:
      title: "Docker socket is world readable"
      description: "%{path} is readable by all local users with mode %{mode}."
      why: "Broad read access can leak sensitive runtime and image metadata and often indicates weak Docker socket access control."
      fix: "Restrict socket permissions to root and the intended admin group."
    docker_daemon_tcp_public:
      title: "Docker daemon exposes a TCP listener"
      description: "%{path} configures Docker to listen on a non-local TCP host."
      why: "A public or broadly reachable Docker API can allow remote container control and host compromise if not strongly protected."
      fix: "Remove the TCP listener or bind it to localhost with strong authentication and network restrictions."
    defensive_controls_missing:
      title: "No intrusion-prevention control was detected"
      description: "%{path} does not show local markers for Fail2ban or CrowdSec."
      why: "Basic blocking or ban automation can slow down repeated password attacks, scanning, and other noisy abuse against exposed services."
      fix: "Install and enable at least one host-level defensive control such as Fail2ban or CrowdSec, then verify it is protecting the services you expose."
  vaultwarden:
    signups_enabled:
      title: "Vaultwarden signups are left enabled"
      description: "%{service} sets SIGNUPS_ALLOWED=true."
      why: "Leaving open registration enabled after initial setup makes it easier for unwanted accounts to be created and expands the public attack surface of a password manager service."
      fix: "Disable signups after the initial onboarding window or gate account creation through an invite-only workflow."
    admin_surface_public:
      title: "Vaultwarden admin surface is reachable from a public bind"
      description: "%{service} enables the admin token while the service is also published on a public interface."
      why: "A publicly reachable Vaultwarden deployment with the admin page enabled exposes a high-value management surface to probing, brute force, and credential leakage risks."
      fix: "Keep Vaultwarden behind a reverse proxy or localhost-only bind and avoid exposing the admin page to the public internet."
    insecure_domain:
      title: "Vaultwarden domain is configured for public HTTP"
      description: "%{service} sets DOMAIN to %{domain}, which is not an HTTPS base URL."
      why: "Vaultwarden expects a secure context for important web features, and using a public HTTP base URL weakens transport security for a password manager deployment."
      fix: "Terminate TLS at a reverse proxy and set DOMAIN to the external HTTPS base URL."
  jellyfin:
    insecure_published_url:
      title: "Jellyfin published URL uses public HTTP"
      description: "%{service} sets JELLYFIN_PublishedServerUrl to %{url}, which is not an HTTPS URL."
      why: "Publishing a media service with an HTTP external URL weakens transport security and makes it easier to expose clients to insecure or mixed-content access paths."
      fix: "Expose Jellyfin through HTTPS and set JELLYFIN_PublishedServerUrl to the external HTTPS URL seen by clients."
    discovery_public:
      title: "Jellyfin autodiscovery port is publicly reachable"
      description: "%{service} publishes the autodiscovery port on %{port}."
      why: "A publicly reachable autodiscovery port increases the visibility of the media server and is often unnecessary outside a trusted local network."
      fix: "Limit the autodiscovery port to a local network, bind it narrowly, or disable the public publish when discovery is not needed."
    media_mount_writable:
      title: "Jellyfin media library is mounted writable"
      description: "%{service} mounts %{path} without read-only protection."
      why: "Granting write access to media libraries increases the impact of a compromise and makes accidental or malicious file modification easier."
      fix: "Mount media libraries read-only unless Jellyfin truly needs write access for that path."
  gitea:
    web_and_ssh_public:
      title: "Gitea publishes both web and SSH surfaces publicly"
      description: "%{service} exposes both the web UI and the Git-over-SSH endpoint directly on public interfaces."
      why: "Publishing both user-facing surfaces directly broadens the attack surface and makes it easier to miss proxy, auth, and rate-limiting protections."
      fix: "Prefer a reverse proxy or narrow binds for the web UI, and expose SSH only when it is intentionally required."
    ssh_published_public:
      title: "Gitea SSH endpoint is publicly reachable"
      description: "%{service} publishes the Git-over-SSH port on %{port}."
      why: "A public SSH endpoint is a separate attack surface that can attract brute force and enumeration even if the web UI is otherwise hardened."
      fix: "Limit SSH exposure to the intended network, use key-based auth, and avoid publishing it publicly when HTTPS clone/push is sufficient."
    inline_security_secrets:
      title: "Gitea app secrets are hardcoded in Compose"
      description: "%{service} sets %{variables} directly in environment."
      why: "Inlining Gitea security tokens in Compose makes them easier to leak through repositories, backups, and process inspection, and misses the documented __FILE-based secret path."
      fix: "Move Gitea security secrets to files or a secrets backend and prefer the documented __FILE configuration path for sensitive values."
  immich:
    shared_secret_env_file:
      title: "Immich shares one secret env file across multiple services"
      description: "%{service} is part of an Immich stack where %{env_file} is reused across multiple services and contains secret values."
      why: "Sharing one plaintext env file across the server and machine-learning services increases blast radius if that file is copied, leaked, or mounted too broadly."
      fix: "Split sensitive values by service where practical and move high-value secrets such as database credentials to a safer secret delivery path."
    default_db_password:
      title: "Immich stack keeps the default database password"
      description: "%{service} is part of an Immich deployment that still uses the default DB_PASSWORD value."
      why: "Leaving the default database password in place makes the storage backend easier to compromise if the stack or env file is exposed."
      fix: "Replace the default DB password with a unique random value before deploying or exposing the stack."
