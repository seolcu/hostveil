app:
  name: "hostveil"
  header:
    subtitle: "Linux Self-Hosting Security Dashboard"
  status:
    bootstrap: "Rust scan, TUI, and JSON export are available for active development."
    no_target: "No explicit target was provided. Run without arguments for live discovery, or pass --compose PATH / --host-root PATH for a targeted scan."
    compose_loaded: "Loaded %{count} service(s) from %{path}"
    host_loaded: "Loaded host checks from %{path}"
    compose_and_host_loaded: "Loaded %{count} service(s) from %{path} with host checks enabled"
    live_discovery: "Live scan: %{project_count} project(s) discovered with host checks enabled"
    live_host_only: "Live scan: host-only mode"
    live_docker_missing: "Live scan: Docker unavailable, host-only mode"
    live_docker_denied: "Live scan: Docker permission denied, host-only mode"
    live_docker_failed: "Live scan: Docker discovery failed, host-only mode"
  help:
    text: |
      hostveil

      Usage:
        hostveil
        hostveil --json
        hostveil [--compose PATH] [--host-root PATH] [--json]
        hostveil --quick-fix PATH [--preview-changes] [--yes]
        hostveil --fix PATH [--preview-changes] [--yes]
        hostveil upgrade [--version TAG]
        hostveil uninstall
        hostveil auto-upgrade enable
        hostveil auto-upgrade disable
        hostveil --version
        hostveil --help

      Lifecycle:
        First install:
          curl -fsSL https://raw.githubusercontent.com/seolcu/hostveil/main/scripts/install.sh | bash
        After install:
          hostveil upgrade
          hostveil uninstall
          hostveil auto-upgrade enable|disable

      Options:
        --compose PATH    override live discovery with a specific Compose file or directory
        --host-root PATH  override the default live host root (/) with a Linux root or snapshot
        --quick-fix PATH  preview or apply safe Compose-only fixes for a specific file or directory
        --fix PATH        preview or apply safe and guided Compose review changes for a specific file or directory
        --preview-changes show the planned diff without writing any files
        --yes             apply the reviewed changes without an interactive confirmation prompt
        --json            emit scan result JSON instead of launching the TUI
        -V, --version     show version information
        -h, --help        show this help message
