services:
  vaultwarden:
    image: vaultwarden/server:1.30.1
    user: "1000:1000"
    ports:
      - "127.0.0.1:8080:80"
    environment:
      DOMAIN: ${VAULTWARDEN_DOMAIN}

  nextcloud:
    image: nextcloud:29.0.7
    user: "33:33"
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./nextcloud:/var/www/html

  gitea:
    image: gitea/gitea:1.21.11
    user: "1000:1000"
    ports:
      - "127.0.0.1:3000:3000"
