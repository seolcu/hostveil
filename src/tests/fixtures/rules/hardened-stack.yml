services:
  vaultwarden:
    image: vaultwarden/server:1.30.1
    user: "1000:1000"
    ports:
      - "127.0.0.1:8080:80"
    environment:
      DOMAIN: ${VAULTWARDEN_DOMAIN}

  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.1.0
    user: "1000:1000"
    ports:
      - "127.0.0.1:2283:2283"
    volumes:
      - ./immich:/data

  gitea:
    image: gitea/gitea:1.21.11
    user: "1000:1000"
    ports:
      - "127.0.0.1:3000:3000"
