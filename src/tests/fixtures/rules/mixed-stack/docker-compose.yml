services:
  vaultwarden:
    image: vaultwarden/server:latest
    user: "1000:1000"
    ports:
      - "8080:80"
    environment:
      ADMIN_TOKEN: supersecret

  adminer:
    image: adminer:latest
    user: root
    ports:
      - "8081:8080"

  postgres:
    image: postgres
    env_file:
      - postgres.env

  backup:
    image: alpine:3.20
    user: "1000:1000"
    privileged: true
