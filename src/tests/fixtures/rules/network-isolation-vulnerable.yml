services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
  db:
    image: postgres:15
    network_mode: bridge
    ports:
      - "5432:5432"
  privileged:
    image: alpine:latest
    network_mode: host
    ports:
      - "8080:8080"

networks:
  frontend:
    driver: bridge
    internal: false
  backend:
    driver: bridge
    internal: true
