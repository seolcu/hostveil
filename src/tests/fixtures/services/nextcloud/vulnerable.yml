services:
  nextcloud:
    image: nextcloud:latest
    environment:
      OVERWRITEPROTOCOL: "http"
      NEXTCLOUD_TRUSTED_DOMAINS: "cloud.example.com, *"
      NEXTCLOUD_ADMIN_USER: "admin"
      NEXTCLOUD_ADMIN_PASSWORD: "admin"
    volumes:
      - ./nextcloud:/var/www/html
    ports:
      - "8080:80"
