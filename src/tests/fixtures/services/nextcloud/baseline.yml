services:
  nextcloud:
    image: nextcloud:30.0.0-apache
    user: "1000:1000"
    environment:
      OVERWRITEPROTOCOL: "https"
      NEXTCLOUD_TRUSTED_DOMAINS: "cloud.example.com"
      NEXTCLOUD_ADMIN_USER: "nc-admin"
      NEXTCLOUD_ADMIN_PASSWORD: "${NEXTCLOUD_ADMIN_PASSWORD}"
    volumes:
      - ./nextcloud:/var/www/html
    ports:
      - "127.0.0.1:8080:80"
