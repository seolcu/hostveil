services:
  grafana:
    image: grafana/grafana:11.0
    user: 1000:1000
    ports:
    - 127.0.0.1:3000:3000
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_AUTH_DISABLE_LOGIN_FORM: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    security_opt:
    - no-new-privileges:true
