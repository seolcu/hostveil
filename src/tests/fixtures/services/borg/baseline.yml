services:
  borg:
    image: borgmatic/borgmatic:latest
    container_name: borg
    restart: unless-stopped
    environment:
      BORG_REPO: ssh://backup-server/repo
      BORG_PASSCOMMAND: cat /run/secrets/borg-passphrase
    volumes:
      - ./data:/data:ro
      - ./secrets:/run/secrets:ro
    security_opt:
      - no-new-privileges:true
