services:
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.10
    user: 1000:1000
    ports:
    - 127.0.0.1:8000:8000
    environment:
      PAPERLESS_FORCE_LOGIN: 'true'
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}
    security_opt:
    - no-new-privileges:true
