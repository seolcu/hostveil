services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.0
    container_name: jellyfin
    user: "1000:1000"
    restart: unless-stopped
    environment:
      JELLYFIN_PublishedServerUrl: "https://media.example.com"
    ports:
      - "127.0.0.1:8096:8096/tcp"
    volumes:
      - ./config:/config
      - ./cache:/cache
      - type: bind
        source: ./media
        target: /media
        read_only: true
