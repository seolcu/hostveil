services:
  lab:
    build:
      context: .
      dockerfile: docker/lab/Dockerfile
    volumes:
      - .:/workspace:ro
      - lab-target:/workspace/target
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:7681:7681"
    environment:
      - HOSTVEIL_LOCALE=en
    privileged: true
    user: 1000:1000

volumes:
  lab-target:
