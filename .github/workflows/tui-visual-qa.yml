name: TUI Visual QA

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: tui-visual-qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tui-ux-checks:
    name: Automated TUI UX scenario validation [DISABLED - tui-ux-check.sh not found]
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker-compose.lab.yml', 'docker/lab/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build lab binary
        run: |
          docker compose -p hostveil-lab -f docker-compose.lab.yml build lab

      - name: Run TUI UX scenarios
        run: |
          ./scripts/tui-ux-check.sh

      - name: Upload TUI UX artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tui-ux-artifacts
          path: target/tui-ux/
          retention-days: 7

      - name: Generate visual QA summary
        if: always()
        run: |
          echo "## TUI UX Scenario Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for report in target/tui-ux/*/report.txt; do
            scenario=$(basename "$(dirname "$report")")
            if [[ -f "$report" ]]; then
              status=$(head -1 "$report")
              echo "- **$scenario**: $status" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Visual QA Linter Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -h "visual-qa:" target/tui-ux/*/report.txt 2>/dev/null | sort | uniq -c | sort -rn | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
