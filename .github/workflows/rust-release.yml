name: Rust Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: rust-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    name: validate release tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo version
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            printf 'error: release tags must use vX.Y.Z\n' >&2
            exit 1
          }

          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' src/Cargo.toml)"

          [[ -n "${cargo_version}" ]] || {
            printf 'error: failed to read version from src/Cargo.toml\n' >&2
            exit 1
          }

          [[ "${tag_version}" == "${cargo_version}" ]] || {
            printf 'error: tag %s does not match Cargo version %s\n' "${GITHUB_REF_NAME}" "${cargo_version}" >&2
            exit 1
          }

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build release binary for smoke tests
        run: cargo build --release --workspace

      - name: Run smoke tests
        run: ./scripts/smoke-test.sh target/release/hostveil

      - name: Run installer tests
        run: ./scripts/test-install-script.sh target/release/hostveil

  build-deb-and-tarballs:
    name: build tarball/deb ${{ matrix.target }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            linker: ""
          - target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install aarch64 cross compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install --yes gcc-aarch64-linux-gnu

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --workspace --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}

      - name: Install package build tools
        run: cargo install cargo-deb

      - name: Package release archive
        run: |
          mkdir -p dist/package
          cp target/${{ matrix.target }}/release/hostveil dist/package/hostveil
          cp README.md LICENSE dist/package/
          tar -C dist/package -czf dist/hostveil-${{ github.ref_name }}-${{ matrix.target }}.tar.gz hostveil README.md LICENSE

      - name: Build Debian release packages
        run: ./scripts/build-release-packages.sh "${{ matrix.target }}" dist deb

      - name: Upload packaged archive
        uses: actions/upload-artifact@v7
        with:
          name: hostveil-deb-${{ matrix.target }}
          path: |
            dist/hostveil-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            dist/*.deb

  build-rpm-x86_64:
    name: build rpm x86_64
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Rocky baseline RPM packages
        run: ./scripts/build-rpm-release.sh x86_64 dist

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hostveil-rpm-x86_64
          path: dist/*.rpm

  build-rpm-aarch64:
    name: build rpm aarch64
    needs: validate
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Rocky baseline RPM packages
        run: ./scripts/build-rpm-release.sh aarch64 dist

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hostveil-rpm-aarch64
          path: dist/*.rpm

  checksums:
    name: generate checksums
    needs:
      - build-deb-and-tarballs
      - build-rpm-x86_64
      - build-rpm-aarch64
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: (cd dist && sha256sum *.tar.gz *.deb *.rpm > SHA256SUMS)

      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: hostveil-checksums
          path: dist/SHA256SUMS

  release:
    name: publish release
    needs: checksums
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download packaged archives and checksums
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Prepare install script asset
        run: cp scripts/install.sh dist/install.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## Install
            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
            ```

            After the first install, use the installed `hostveil` command for lifecycle actions.

            ## Package installs
            Debian-family users can install the release `.deb` asset with:
            ```sh
            sudo apt install ./hostveil_<version>_amd64.deb
            ```

            Fedora-family and Rocky/RHEL 9-class users can install the release `.rpm` asset with:
            ```sh
            sudo dnf install ./hostveil-<version>-1.x86_64.rpm
            ```

            RPM packages are built on a Rocky Linux 9 compatible baseline.

            Optional dependency setup after install:
            ```sh
            hostveil setup
            ```

            Locale defaults to English for terminal safety. Use `hostveil --locale ko ...` or `HOSTVEIL_LOCALE=ko hostveil ...` for an explicit override. In the TUI, open Settings (`s`) to switch locale and persist it.

            ## Upgrade
            ```sh
            hostveil upgrade
            ```

            ## Automatic upgrades
            Automatic upgrades are enabled by default whenever `hostveil` launches.

            Disable them with:
            ```sh
            hostveil auto-upgrade disable
            ```

            Re-enable them with:
            ```sh
            hostveil auto-upgrade enable
            ```

            Package installs do not support launch-time auto-upgrade; update them by installing a newer release package.

            ## Uninstall
            ```sh
            hostveil uninstall
            ```

            For package installs, remove hostveil with your system package manager instead.

            ## Optional dependencies
            - Docker improves live Compose discovery when it is available.
            - Trivy is supported as an optional image vulnerability adapter.
            - Dockle is supported as an optional image hardening adapter.
            - Lynis is supported as an optional host-audit adapter.
            - Fail2Ban remains optional; host scans continue without it, but host hardening coverage is reduced.

            ## Known limitations
            - Linux only
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS
            dist/install.sh
