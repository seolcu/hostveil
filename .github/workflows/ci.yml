name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Callable so the release workflow can run this exact gate against the
  # commit being tagged, rather than trusting that some earlier run of it
  # passed. Adding this does not change when CI runs on its own.
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Verify site/ is up to date with sitegen
        run: |
          go run ./cmd/sitegen
          changes=$(git status --porcelain site/)
          if [ -n "$changes" ]; then
            echo "site/ is out of date (modified, added, or removed files):"
            echo "$changes"
            echo "Run 'go run ./cmd/sitegen' and commit the result."
            exit 1
          fi

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check go.mod is tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Verify install.sh checksum is up to date
        run: |
          cd scripts && sha256sum -c install.sh.sha256

      - name: Test
        run: go test -race ./...
