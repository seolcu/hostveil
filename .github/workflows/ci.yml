name: CI

on:
  push:
    branches: [main, v1.0.0-rewrite]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build -o hostveil ./cmd/hostveil/

      - name: Smoke test
        run: |
          ./hostveil --help
          ./hostveil --version
          ./hostveil --compose tests/scenarios/vaultwarden-domain/docker-compose.yml --output json --findings-only > /dev/null
          echo "Smoke test passed"

      - name: Adapter integration tests
        run: go test -race -count=1 -run 'Test.*Parsing|Test.*IsAvailable|TestCommandRunner' ./internal/adapter/

      - name: Fix engine tests
        run: go test -race -count=1 -run 'Test.*Fix|Test.*Edit|Test.*Coverage' ./internal/fix/

      - name: Scanner integration tests
        run: go test -race -count=1 -run 'TestScan' ./internal/scanner/

      - name: E2E screen test (tmux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get -qq update && sudo apt-get -qq install -y tmux
          scripts/tui-test.sh

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: hostveil-linux-amd64
          path: hostveil
