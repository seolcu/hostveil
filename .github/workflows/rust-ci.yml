name: Rust CI

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - docs/**
      - refactor/**
      - chore/**
      - ci/**
  pull_request:

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: fmt, clippy, test, smoke, installer
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build debug binary
        run: cargo build --workspace

      - name: Run smoke tests
        run: ./scripts/smoke-test.sh target/debug/hostveil

      - name: Run installer tests
        run: ./scripts/test-install-script.sh target/debug/hostveil

      - name: Install package build tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build release binary for package validation
        run: cargo build --release --workspace --target x86_64-unknown-linux-gnu

      - name: Build release packages
        run: ./scripts/build-release-packages.sh x86_64-unknown-linux-gnu

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate test coverage
        run: cargo tarpaulin --workspace --out Html --out Lcov --output-dir coverage
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
