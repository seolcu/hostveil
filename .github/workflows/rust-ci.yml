name: Rust CI

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - docs/**
      - refactor/**
      - chore/**
      - ci/**
  pull_request:

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: fmt, clippy, test, smoke, installer
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build debug binary
        run: cargo build --workspace

      - name: Run smoke tests
        run: ./scripts/smoke-test.sh target/debug/hostveil

      - name: Run installer tests
        run: ./scripts/test-install-script.sh target/debug/hostveil

      - name: Install package build tools
        run: cargo install cargo-deb

      - name: Build release binary for package validation
        run: cargo build --release --workspace --target x86_64-unknown-linux-gnu

      - name: Build Debian package smoke
        run: ./scripts/build-release-packages.sh x86_64-unknown-linux-gnu target/package-assets deb

      - name: Build Rocky baseline RPM smoke
        run: ./scripts/build-rpm-release.sh x86_64 target/package-assets

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-dir coverage --output-path coverage.lcov
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Post coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lcovPath = 'coverage.lcov';
            if (!fs.existsSync(lcovPath)) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '⚠️ Coverage report generation failed'
              });
              return;
            }
            
            // Simple LCOV parsing
            const lcov = fs.readFileSync(lcovPath, 'utf8');
            let hit = 0, found = 0;
            for (const line of lcov.split('\n')) {
              if (line.startsWith('DA:')) {
                const [, count] = line.slice(3).split(',');
                found++;
                if (parseInt(count) > 0) hit++;
              }
            }
            const pct = found > 0 ? ((hit / found) * 100).toFixed(1) : 0;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Coverage Report\n- Lines: ${hit}/${found} (${pct}%)\n- [View full report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
        continue-on-error: true
