# A "management" stack — the containers people add to make life easier,
# and which quietly hand an attacker the whole host.
services:
  portainer:
    image: portainer/portainer-ce:2.9.0   # intentionally old → image CVEs
    ports:
      - "9000:9000"                        # admin panel on 0.0.0.0 → compose.ds019
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # → compose.ds016 (Critical)
      - portainer-data:/data

  watchtower:
    image: containrrr/watchtower:1.3.0     # real homelab auto-updater; also old → CVEs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # → compose.ds016 (Critical)

  monitor:
    image: alpine:3.14                     # a "monitoring" helper left over-privileged
    command: ["sleep", "infinity"]
    privileged: true                       # → compose.ds001
    cap_add:
      - SYS_ADMIN                          # → compose.ds005

volumes:
  portainer-data:
